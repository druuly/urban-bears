<div id="profile-modal" class="modal-backdrop" hidden aria-hidden="true">
  <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-logo-wrap">
      <img src="/assets/images/logo/urbanbearlogo.png" alt="Urban Bears logo" class="modal-logo" />
    </div>
    <h2 class="modal-heading" id="modal-title">Welcome to Urban BEARS</h2>
    <p class="modal-subtitle">Complete your profile to join our community.</p>
    <form id="profile-form" novalidate>
      <div class="modal-field">
        <label for="modal-first">First Name</label>
        <input id="modal-first" name="firstName" type="text" required autocomplete="given-name" placeholder="Jane" />
      </div>
      <div class="modal-field">
        <label for="modal-last">Last Name</label>
        <input id="modal-last" name="lastName" type="text" required autocomplete="family-name" placeholder="Smith" />
      </div>
      <div class="modal-field">
        <label for="modal-school">School</label>
        <input id="modal-school" name="schoolName" type="text" required autocomplete="organization" placeholder="Lincoln High School" />
      </div>
      <div class="modal-field modal-field-check">
        <label class="check-label">
          <input id="modal-digest" name="digestOptIn" type="checkbox" />
          <span>I agree to receive emails from Urban BEAR's digest</span>
        </label>
      </div>
      <p class="modal-error" hidden></p>
      <button type="submit" class="btn-modal-submit" disabled>
        <span class="btn-modal-label">Join</span>
      </button>
    </form>
  </div>
</div>
