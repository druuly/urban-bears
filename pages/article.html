<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Article — Urban BEARS</title>

  <link href="https://fonts.cdnfonts.com/css/the-seasons" rel="stylesheet" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="../css/base.css" />
  <link rel="stylesheet" href="../css/animations.css" />

  <style>
    /* ════════════════════════════════════════════════════════════════
       ARTICLE PAGE — Substack-style standalone reader
    ════════════════════════════════════════════════════════════════ */

    .article-wrap {
      width: min(48rem, 100%);
      margin: 3rem auto 5rem;
      padding: 0 1rem;
      animation: fadeSlideUp .55s cubic-bezier(.4,0,.2,1) both;
    }

    .article-back {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      color: var(--white);
      opacity: .6;
      font-family: 'Libre Baskerville', serif;
      font-size: .85rem;
      letter-spacing: .04em;
      margin-bottom: 2rem;
      transition: opacity var(--transition);
    }
    .article-back:hover { opacity: 1; }

    .article-cover {
      width: 100%;
      aspect-ratio: 21 / 9;
      border-radius: 1rem;
      background-size: cover;
      background-position: center;
      background-color: var(--navy-mid);
      margin-bottom: 2rem;
    }
    .article-cover.empty { display: none; }

    .article-title {
      font-family: 'The Seasons', 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(2rem, 4vw, 2.9rem);
      letter-spacing: .02em;
      line-height: 1.18;
      color: var(--white);
      margin-bottom: .8rem;
    }

    .article-subtitle {
      font-family: 'Libre Baskerville', serif;
      font-size: 1.1rem;
      color: var(--white);
      opacity: .55;
      line-height: 1.5;
      margin-bottom: 1.8rem;
    }
    .article-subtitle:empty { display: none; }

    .article-byline {
      display: flex;
      align-items: center;
      gap: .8rem;
      margin-bottom: 1.4rem;
    }
    .article-byline .pub-avatar {
      width: 2.4rem;
      height: 2.4rem;
      border-radius: 50%;
      background: var(--navy-mid);
      border: 1px solid rgba(255,255,255,.18);
      object-fit: cover;
      flex-shrink: 0;
    }
    .article-byline .pub-info {
      display: flex;
      flex-direction: column;
      gap: .15rem;
      font-family: 'Libre Baskerville', serif;
    }
    .article-byline .pub-name {
      font-size: .9rem;
      letter-spacing: .02em;
      color: var(--white);
      font-weight: 700;
    }
    .article-byline .pub-date {
      font-size: .75rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--white);
      opacity: .55;
    }

    /* ── Action bar — pill icons ── */
    .article-actions {
      display: flex;
      align-items: center;
      gap: .5rem;
      padding: 1.2rem 0;
      border-top: 1px solid rgba(255,255,255,.1);
      border-bottom: 1px solid rgba(255,255,255,.1);
      margin-bottom: 2.4rem;
    }
    .pill-btn {
      display: inline-flex;
      align-items: center;
      gap: .4rem;
      padding: .45rem .9rem;
      background: transparent;
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 2rem;
      color: var(--white);
      font-family: 'Libre Baskerville', serif;
      font-size: .85rem;
      cursor: pointer;
      transition: background var(--transition),
                  border-color var(--transition),
                  color var(--transition),
                  transform var(--transition);
    }
    .pill-btn:hover {
      border-color: rgba(255,255,255,.4);
      background: rgba(255,255,255,.04);
    }
    .pill-btn svg {
      width: 1.05rem;
      height: 1.05rem;
      stroke: var(--white);
      fill: none;
      stroke-width: 1.8;
      transition: fill var(--transition), stroke var(--transition), transform var(--transition);
    }
    .pill-btn.active {
      background: var(--lavender-bg);
      color: var(--navy);
      border-color: var(--lavender-bg);
    }
    .pill-btn.active svg {
      stroke: var(--navy);
      fill: var(--navy);
    }
    .pill-btn.pulse svg { animation: pulse .5s ease; }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50%      { transform: scale(1.35); }
    }
    .pill-btn .count {
      font-size: .85rem;
      font-weight: 400;
    }
    .pill-share {
      margin-left: auto;
    }

    /* ── Delete (authors only) ── */
    .pill-delete {
      border-color: rgba(255, 100, 100, .35);
      color: #ff9090;
    }
    .pill-delete svg {
      stroke: #ff9090;
    }
    .pill-delete:hover {
      background: #c83232;
      border-color: #c83232;
      color: #fff;
      transform: translateY(-2px);
      box-shadow: 0 6px 18px rgba(200, 50, 50, .35);
    }
    .pill-delete:hover svg {
      stroke: #fff;
      animation: shake .4s cubic-bezier(.36,.07,.19,.97) both;
    }
    @keyframes shake {
      10%, 90% { transform: rotate(-4deg); }
      20%, 80% { transform: rotate(5deg); }
      30%, 50%, 70% { transform: rotate(-6deg); }
      40%, 60% { transform: rotate(6deg); }
    }

    /* ── Body content ── */
    .article-content {
      color: var(--white);
      font-family: 'Libre Baskerville', serif;
      font-size: 1.05rem;
      line-height: 1.85;
    }
    .article-content h1, .article-content h2, .article-content h3,
    .article-content h4, .article-content h5, .article-content h6 {
      font-family: 'The Seasons', 'Cormorant Garamond', Georgia, serif;
      color: var(--white);
      letter-spacing: .02em;
      margin: 2.2rem 0 .9rem;
      line-height: 1.3;
      font-weight: 700;
    }
    .article-content h1 { font-size: 1.85rem; }
    .article-content h2 { font-size: 1.55rem; }
    .article-content h3 { font-size: 1.3rem; }
    .article-content p { margin-bottom: 1.2rem; color: var(--white); }
    .article-content a { color: var(--lavender-bg); text-decoration: underline; }
    .article-content a:hover { color: var(--lavender-lt); }
    .article-content blockquote {
      border-left: 3px solid var(--lavender-bg);
      padding-left: 1.2rem;
      margin: 1.5rem 0;
      font-style: italic;
      color: var(--white);
      opacity: .92;
    }
    .article-content ul, .article-content ol {
      margin: 0 0 1.2rem 1.6rem;
      color: var(--white);
    }
    .article-content li { margin-bottom: .4rem; }
    .article-content img {
      width: 100%;
      border-radius: 1rem;
      margin: 1.5rem 0;
      border: 1px solid rgba(255,255,255,.18);
    }
    .article-content pre, .article-content code {
      background: rgba(255,255,255,.08);
      border-radius: .4rem;
      color: var(--white);
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    .article-content code { padding: .1rem .35rem; font-size: .9em; }
    .article-content pre { padding: 1rem; overflow-x: auto; margin: 1rem 0; }

    /* ── Tags ── */
    .article-tags {
      display: flex;
      gap: .4rem;
      flex-wrap: wrap;
      margin: 2.4rem 0 0;
      padding-top: 1.6rem;
      border-top: 1px solid rgba(255,255,255,.1);
    }
    .article-tags span {
      padding: .3rem .8rem;
      background: rgba(207,214,245,.12);
      border: 1px solid rgba(207,214,245,.35);
      border-radius: var(--radius-btn);
      font-size: .72rem;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--white);
      font-family: 'Libre Baskerville', serif;
    }
    .article-tags:empty { display: none; }

    .loader {
      width: 2.4rem; height: 2.4rem;
      border: 3px solid rgba(255,255,255,.15);
      border-top-color: var(--white);
      border-radius: 50%;
      animation: spin .9s linear infinite;
      margin: 5rem auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .not-found {
      text-align: center;
      padding: 5rem 2rem;
      color: var(--white);
      font-style: italic;
      opacity: .7;
    }

    /* ── Confirm dialog ── */
    .confirm-overlay {
      position: fixed;
      inset: 0;
      background: rgba(8,8,22,.6);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      z-index: 400;
      display: none;
      align-items: center;
      justify-content: center;
    }
    .confirm-overlay.open {
      display: flex;
      animation: fadeIn .2s ease both;
    }
    .confirm-box {
      width: min(26rem, 92vw);
      background: var(--navy);
      border: 1.5px solid rgba(220,80,80,.35);
      border-radius: var(--radius-card);
      padding: 2.4rem 2rem 1.8rem;
      text-align: center;
      animation: modalIn .3s cubic-bezier(.4,0,.2,1) both;
    }
    @keyframes modalIn {
      from { opacity: 0; transform: translateY(2rem) scale(.97); }
      to   { opacity: 1; transform: none; }
    }
    .confirm-box .confirm-icon {
      width: 3.2rem; height: 3.2rem;
      background: rgba(220,60,60,.12);
      border: 1.5px solid rgba(220,80,80,.3);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.2rem;
    }
    .confirm-box .confirm-icon svg {
      width: 1.5rem; height: 1.5rem;
      stroke: #e07070;
      fill: none;
      stroke-width: 2;
    }
    .confirm-box h3 {
      font-family: 'The Seasons', 'Cormorant Garamond', Georgia, serif;
      font-size: 1.4rem;
      letter-spacing: .05em;
      color: var(--white);
      margin-bottom: .6rem;
    }
    .confirm-box p {
      font-family: 'Libre Baskerville', serif;
      font-size: .88rem;
      color: var(--white);
      opacity: .7;
      line-height: 1.6;
      margin-bottom: 1.8rem;
    }
    .confirm-actions {
      display: flex;
      gap: .8rem;
      justify-content: center;
    }
    .btn-confirm-cancel, .btn-confirm-delete {
      font-family: 'Libre Baskerville', serif;
      font-size: .83rem;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      padding: .75rem 1.5rem;
      border-radius: var(--radius-btn);
      cursor: pointer;
      transition: transform var(--transition), background var(--transition),
                  box-shadow var(--transition), border-color var(--transition);
    }
    .btn-confirm-cancel {
      background: transparent;
      border: 1.5px solid rgba(255,255,255,.28);
      color: var(--white);
    }
    .btn-confirm-cancel:hover {
      border-color: var(--white);
      transform: translateY(-2px);
    }
    .btn-confirm-delete {
      background: rgba(200,50,50,.85);
      border: 1.5px solid rgba(220,80,80,.5);
      color: #fff;
    }
    .btn-confirm-delete:hover {
      background: #c83232;
      transform: translateY(-2px);
      box-shadow: 0 8px 22px rgba(200,50,50,.35);
    }

    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(2rem);
      background: var(--lavender-bg);
      color: var(--navy);
      padding: .9rem 1.6rem;
      border-radius: var(--radius-btn);
      font-family: 'Libre Baskerville', serif;
      font-size: .9rem;
      font-weight: 700;
      letter-spacing: .04em;
      opacity: 0;
      pointer-events: none;
      transition: opacity .3s ease, transform .35s cubic-bezier(.4,0,.2,1);
      z-index: 300;
      box-shadow: 0 12px 36px rgba(0,0,0,.4);
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 36rem) {
      .article-wrap { margin-top: 1.5rem; }
      .article-actions { flex-wrap: wrap; }
      .pill-share { margin-left: 0; }
    }
  </style>
</head>
<body>

  <div data-component="nav"></div>

  <main class="article-wrap" id="article-wrap">
    <a class="article-back" href="research.html">← Back to Research</a>
    <div id="article-root">
      <div class="loader" aria-label="Loading"></div>
    </div>
  </main>

  <!-- ─── DELETE CONFIRM DIALOG ─── -->
  <div class="confirm-overlay" id="confirm-overlay" role="dialog" aria-modal="true" aria-labelledby="confirm-heading">
    <div class="confirm-box">
      <div class="confirm-icon">
        <svg viewBox="0 0 24 24"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg>
      </div>
      <h3 id="confirm-heading">Delete Article?</h3>
      <p>This will permanently remove the article for everyone. This action cannot be undone.</p>
      <div class="confirm-actions">
        <button class="btn-confirm-cancel" id="btn-confirm-cancel">Keep it</button>
        <button class="btn-confirm-delete" id="btn-confirm-delete">Yes, delete</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <div data-component="footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>

  <script type="module">
    import { loadComponents } from '/js/components.js';
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-analytics.js";
    import {
      getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
    import {
      getFirestore, doc, getDoc, setDoc, deleteDoc,
      serverTimestamp, increment, updateDoc, onSnapshot
    } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";
    import { checkAndShowProfileModal } from '/js/profile-modal.js';

    /* Shared components (nav, footer, profile modal) must be in the DOM
       before any code below queries it. */
    await loadComponents();
    await import('/js/main.js');

    const firebaseConfig = {
      apiKey: "AIzaSyCubjX7XwPD9lfOh2kdBO0DRlDQSn9OZWs",
      authDomain: "urban-bears.firebaseapp.com",
      projectId: "urban-bears",
      storageBucket: "urban-bears.firebasestorage.app",
      messagingSenderId: "624423642068",
      appId: "1:624423642068:web:78c4845d6765a9dc07ec41",
      measurementId: "G-9W94R3112S"
    };
    const app = initializeApp(firebaseConfig);
    try { getAnalytics(app); } catch (e) {}
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    const state = {
      user: null,
      isAuthor: false,
      articleId: null,
      article: null,
      unsub: null,
    };

    const $ = (id) => document.getElementById(id);
    const params = new URLSearchParams(location.search);
    state.articleId = params.get('id') || params.get('article');

    const fmtDate = (ts) => {
      if (!ts) return '';
      const d = ts.toDate ? ts.toDate() : new Date(ts);
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }).toUpperCase();
    };
    const escapeHtml = (s = '') => s.replace(/[&<>"']/g, c =>
      ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    const showToast = (msg) => {
      const t = $('toast');
      t.textContent = msg;
      t.classList.add('show');
      clearTimeout(showToast._t);
      showToast._t = setTimeout(() => t.classList.remove('show'), 2400);
    };

    /* ── Auth ── */
    $('btn-signin').addEventListener('click', async () => {
      try { await signInWithPopup(auth, provider); }
      catch (e) { console.error(e); showToast('Sign in failed'); }
    });
    $('btn-signout').addEventListener('click', () => signOut(auth));

    const renderAuthBar = () => {
      if (state.user) {
        $('btn-signin').hidden = true;
        $('nav-user-wrap').hidden = false;
        $('nav-user-chip').innerHTML = `
          <img src="${state.user.photoURL || ''}" alt="" />
          <div><div class="name">${escapeHtml(state.user.displayName || 'Reader')}</div></div>
        `;
      } else {
        $('btn-signin').hidden = false;
        $('nav-user-wrap').hidden = true;
      }
    };

    onAuthStateChanged(auth, async (user) => {
      state.user = user;
      state.isAuthor = false;
      if (user) {
        checkAndShowProfileModal(user, app);
        try {
          const authorDoc = await getDoc(doc(db, 'authors', user.uid));
          state.isAuthor = authorDoc.exists();
        } catch (e) {}
      }
      renderAuthBar();
      syncActions();
      const deleteBtn = $('action-delete');
      if (deleteBtn) deleteBtn.style.display = state.isAuthor ? '' : 'none';
    });

    /* ── Render article ── */
    const renderArticle = (a) => {
      const coverStyle = a.coverUrl
        ? `style="background-image:url('${escapeHtml(a.coverUrl)}')"`
        : '';
      const coverClass = a.coverUrl ? '' : 'empty';
      const subtitle = a.subtitle ? escapeHtml(a.subtitle) : '';
      const date = fmtDate(a.createdAt);
      const body = DOMPurify.sanitize(a.body || '');
      const tagsHtml = (a.tags || [])
        .map(t => `<span>${escapeHtml(t)}</span>`).join('');

      $('article-root').innerHTML = `
        <div class="article-cover ${coverClass}" ${coverStyle}></div>
        <h1 class="article-title">${escapeHtml(a.title || 'Untitled')}</h1>
        <p class="article-subtitle">${subtitle}</p>
        <div class="article-byline">
          <img class="pub-avatar" src="${escapeHtml(a.authorPhoto || '../assets/images/logo/urbanbearlogo.png')}" alt="${escapeHtml(a.authorName || 'Author')}" onerror="this.src='../assets/images/logo/urbanbearlogo.png'" />
          <div class="pub-info">
            <span class="pub-name">${escapeHtml(a.authorName || 'Anonymous')}</span>
            <span class="pub-date">${a.authorSchool ? escapeHtml(a.authorSchool) + ' · ' : ''}URBANBEARS · ${date}</span>
          </div>
        </div>
        <div class="article-actions">
          <button class="pill-btn" id="action-like" aria-label="Like">
            <svg viewBox="0 0 24 24" stroke-linejoin="round" stroke-linecap="round"><path d="M12 21s-7-4.5-9.5-9C.6 8 3 4 7 4c2 0 3.5 1 5 3 1.5-2 3-3 5-3 4 0 6.4 4 4.5 8-2.5 4.5-9.5 9-9.5 9z"/></svg>
            <span class="count" id="like-count">${a.likeCount || 0}</span>
          </button>
          <button class="pill-btn" id="action-comment" aria-label="Comment" title="Comments coming soon">
            <svg viewBox="0 0 24 24" stroke-linejoin="round" stroke-linecap="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
          </button>
          <button class="pill-btn" id="action-repost" aria-label="Repost">
            <svg viewBox="0 0 24 24" stroke-linejoin="round" stroke-linecap="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
            <span class="count" id="repost-count">${a.repostCount || 0}</span>
          </button>
          <button class="pill-btn pill-share" id="action-share" aria-label="Share">
            <span>Share</span>
          </button>
          <button class="pill-btn pill-delete" id="action-delete" style="display:none;" aria-label="Delete">
            <svg viewBox="0 0 24 24" stroke-linejoin="round" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M8 6V4h8v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
            <span>Delete</span>
          </button>
        </div>
        <div class="article-content">${body}</div>
        <div class="article-tags">${tagsHtml}</div>
      `;

      wireActions();
      syncActions();
      $('action-delete').style.display = state.isAuthor ? '' : 'none';
    };

    const wireActions = () => {
      $('action-like').addEventListener('click', () => toggleEngagement('like'));
      $('action-repost').addEventListener('click', () => toggleEngagement('repost'));
      $('action-share').addEventListener('click', shareArticle);
      $('action-delete').addEventListener('click', deleteArticle);
    };

    const syncActions = async () => {
      const likeBtn = $('action-like');
      const repostBtn = $('action-repost');
      if (!likeBtn || !repostBtn) return;
      likeBtn.classList.remove('active');
      repostBtn.classList.remove('active');
      if (!state.user || !state.articleId) return;
      try {
        const [likeSnap, repostSnap] = await Promise.all([
          getDoc(doc(db, 'articles', state.articleId, 'likes', state.user.uid)),
          getDoc(doc(db, 'articles', state.articleId, 'reposts', state.user.uid)),
        ]);
        if (likeSnap.exists()) likeBtn.classList.add('active');
        if (repostSnap.exists()) repostBtn.classList.add('active');
      } catch (e) {}
    };

    const toggleEngagement = async (type) => {
      if (!state.user) { showToast('Sign in to interact'); return; }
      const id = state.articleId;
      if (!id) return;
      const subRef = doc(db, 'articles', id, type === 'like' ? 'likes' : 'reposts', state.user.uid);
      const countField = type === 'like' ? 'likeCount' : 'repostCount';
      const btn = $(type === 'like' ? 'action-like' : 'action-repost');
      try {
        const snap = await getDoc(subRef);
        if (snap.exists()) {
          await deleteDoc(subRef);
          await updateDoc(doc(db, 'articles', id), { [countField]: increment(-1) });
          btn.classList.remove('active');
        } else {
          await setDoc(subRef, { createdAt: serverTimestamp() });
          await updateDoc(doc(db, 'articles', id), { [countField]: increment(1) });
          btn.classList.add('active');
          btn.classList.add('pulse');
          setTimeout(() => btn.classList.remove('pulse'), 500);
        }
      } catch (e) {
        console.error(e);
        showToast('Action failed');
      }
    };

    const shareArticle = async () => {
      const url = location.href;
      const title = state.article?.title || 'Urban Bears';
      try {
        if (navigator.share) {
          await navigator.share({ url, title });
        } else {
          await navigator.clipboard.writeText(url);
          showToast('Link copied');
        }
      } catch (e) {
        try { await navigator.clipboard.writeText(url); showToast('Link copied'); }
        catch { showToast('Could not share'); }
      }
    };

    /* ── Delete (authors) ── */
    const showConfirm = () => new Promise((resolve) => {
      const overlay = $('confirm-overlay');
      const cancel = $('btn-confirm-cancel');
      const del = $('btn-confirm-delete');
      overlay.classList.add('open');
      const onCancel = () => { cleanup(); resolve(false); };
      const onDelete = () => { cleanup(); resolve(true); };
      const onKey = (e) => { if (e.key === 'Escape') { cleanup(); resolve(false); } };
      const cleanup = () => {
        overlay.classList.remove('open');
        cancel.removeEventListener('click', onCancel);
        del.removeEventListener('click', onDelete);
        document.removeEventListener('keydown', onKey);
      };
      cancel.addEventListener('click', onCancel);
      del.addEventListener('click', onDelete);
      document.addEventListener('keydown', onKey);
    });

    const deleteArticle = async () => {
      if (!state.isAuthor || !state.articleId) return;
      const ok = await showConfirm();
      if (!ok) return;
      try {
        await deleteDoc(doc(db, 'articles', state.articleId));
        showToast('Article deleted');
        setTimeout(() => { location.href = 'research.html'; }, 800);
      } catch (e) {
        console.error(e);
        showToast('Delete failed');
      }
    };

    /* ── Load article ── */
    const loadArticle = () => {
      if (!state.articleId) {
        $('article-root').innerHTML = `<div class="not-found">No article specified.</div>`;
        return;
      }
      if (state.unsub) state.unsub();
      state.unsub = onSnapshot(doc(db, 'articles', state.articleId), (snap) => {
        if (!snap.exists()) {
          $('article-root').innerHTML = `<div class="not-found">This article could not be found.</div>`;
          return;
        }
        const a = { id: snap.id, ...snap.data() };
        state.article = a;
        document.title = `${a.title || 'Article'} — Urban BEARS`;
        renderArticle(a);
      }, (err) => {
        console.error(err);
        $('article-root').innerHTML = `<div class="not-found">Failed to load article.</div>`;
      });

      updateDoc(doc(db, 'articles', state.articleId), { viewCount: increment(1) })
        .catch(() => {});
    };

    loadArticle();
  </script>

  <!-- ── Profile Setup Modal ── -->
  <div data-component="profile-modal"></div>

</body>
</html>
