<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Research — Urban BEARS</title>

  <link href="https://fonts.cdnfonts.com/css/the-seasons" rel="stylesheet" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="../css/base.css" />
  <link rel="stylesheet" href="../css/animations.css" />

  <!-- Quill 2.x editor -->
  <link href="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.snow.css" rel="stylesheet" />
  <!-- Cropper.js -->
  <link href="https://cdn.jsdelivr.net/npm/cropperjs@1.6.2/dist/cropper.min.css" rel="stylesheet" />


  <style>
    /* ════════════════════════════════════════════════════════════════
       RESEARCH JOURNAL — Substack-style system
       All custom typography stays white-on-navy or navy-on-lavender,
       per project palette. No grey body fonts.
    ════════════════════════════════════════════════════════════════ */

    /* ── Auth bar (+ New Article for authors) ── */
    .auth-bar {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 1rem;
      padding: .6rem 0 .2rem;
      min-height: 2rem;
    }
    .btn-signin, .btn-new-article {
      font-family: 'Libre Baskerville', serif;
      font-size: .82rem;
      font-weight: 700;
      letter-spacing: .05em;
      text-transform: uppercase;
      padding: .7rem 1.4rem;
      border-radius: var(--radius-btn);
      border: 1.5px solid var(--white);
      background: transparent;
      color: var(--white);
      cursor: pointer;
      transition: background var(--transition), color var(--transition),
                  transform var(--transition);
    }
    .btn-signin:hover {
      background: var(--white);
      color: var(--navy);
      transform: translateY(-2px);
    }
    .btn-new-article {
      position: relative;
      overflow: hidden;
      background: transparent;
      color: var(--white);
      border-color: var(--white);
      transition: color var(--transition), border-color var(--transition),
                  transform var(--transition), box-shadow var(--transition);
      z-index: 0;
    }
    .btn-new-article::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--lavender-bg);
      transform: translateX(-100%);
      transition: transform .5s cubic-bezier(.4,0,.2,1);
      z-index: -1;
    }
    .btn-new-article:hover::before {
      transform: translateX(0);
    }
    .btn-new-article:hover {
      color: var(--navy);
      border-color: var(--lavender-bg);
      transform: scale(1.05);
      box-shadow: 0 8px 22px rgba(207,214,245,.18);
    }
    .user-chip {
      display: flex;
      align-items: center;
      gap: .7rem;
      padding: .35rem .9rem .35rem .35rem;
      border: 1.5px solid rgba(255,255,255,.25);
      border-radius: var(--radius-btn);
      color: var(--white);
      font-family: 'Libre Baskerville', serif;
      font-size: .9rem;
      animation: fadeIn .4s ease both;
    }
    .user-chip img {
      width: 2rem; height: 2rem; border-radius: 50%;
      border: 1.5px solid var(--white);
    }
    .user-chip .name { font-weight: 700; }
    .user-chip .role {
      font-size: .7rem;
      font-style: italic;
      letter-spacing: .04em;
    }

    /* ── Journal header bar ── */
    .journal-topbar {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.8rem 0 0;
      gap: 1rem;
      position: relative;
      z-index: 1;
    }

    /* ── Tabs — pill style ── */
    .research-tabs {
      display: inline-flex;
      gap: .3rem;
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.25);
      border-radius: 2rem;
      padding: .3rem;
    }
    .research-tabs button {
      background: none;
      border: none;
      color: var(--white);
      font-family: 'Libre Baskerville', serif;
      font-size: .88rem;
      letter-spacing: .04em;
      padding: .45rem 1.3rem;
      border-radius: 2rem;
      cursor: pointer;
      opacity: .65;
      transition: opacity var(--transition), background var(--transition),
                  color var(--transition), transform var(--transition);
    }
    .research-tabs button:hover {
      opacity: 1;
      background: rgba(255,255,255,.12);
      transform: scale(1.05);
    }
    .research-tabs button.active {
      opacity: 1;
      background: var(--lavender-bg);
      color: var(--navy);
      font-weight: 700;
    }
    .research-tabs button.active:hover {
      background: var(--lavender-lt);
      transform: scale(1.05);
    }

    /* ── View switcher ── */
    .view { display: none; padding: 2rem 0 5rem; }
    .view.active {
      display: block;
      animation: fadeSlideUp .55s cubic-bezier(.4,0,.2,1) both;
    }

    /* Home view is viewport-locked — no page scroll, no horizontal drift.
       Scoped to .active so display:flex doesn't override .view{display:none}
       when the Archive tab is selected. */
    .view-home.active {
      display: flex;
      flex-direction: column;
      padding-bottom: 3rem;
    }
    .view-home #home-content {
      display: flex;
      flex-direction: column;
    }
    /* Hide the "Recent posts" strip — Archive covers all articles */
    .view-home .recent-section { display: none; }

    /* ── Section labels ── */
    .section-label {
      font-family: 'Libre Baskerville', serif;
      font-size: .75rem;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--white);
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: .8rem;
    }
    .section-label .see-all {
      margin-left: auto;
      font-size: .72rem;
      cursor: pointer;
      letter-spacing: .08em;
      text-decoration: underline;
      text-underline-offset: 3px;
    }
    .section-label .see-all:hover { opacity: 1; }

    /* ══ HOME 3-COLUMN GRID ══ */
    .home-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 2rem;
      align-items: start;
    }

    /* Left column */
    .home-left {
      display: flex;
      flex-direction: column;
      gap: 1.6rem;
    }
    .home-left::-webkit-scrollbar { width: 4px; }
    .home-left::-webkit-scrollbar-track { background: transparent; }
    .home-left::-webkit-scrollbar-thumb { background: rgba(255,255,255,.18); border-radius: 2px; }
    .small-card {
      display: flex;
      flex-direction: column;
      cursor: pointer;
      gap: .75rem;
      transition: opacity var(--transition);
    }
    .small-card:hover { opacity: .82; }
    .small-card .cover {
      aspect-ratio: 4 / 3;
      border-radius: 1rem;
      background-size: cover;
      background-position: center;
      background-color: var(--navy-mid);
    }
    .small-card h3 {
      font-family: 'The Seasons', 'Cormorant Garamond', Georgia, serif;
      font-size: 1.15rem;
      line-height: 1.3;
      letter-spacing: .02em;
      color: var(--white);
    }
    .small-card .card-meta {
      font-size: .78rem;
      font-family: 'Libre Baskerville', serif;
      color: var(--white);
    }

    /* Center column — featured large */
    .home-center { display: flex; flex-direction: column; gap: 0; }
    .featured-center {
      cursor: pointer;
      transition: opacity var(--transition);
    }
    .featured-center:hover { opacity: .88; }
    .featured-center .cover {
      aspect-ratio: 4 / 3;
      border-radius: 1.2rem;
      background-size: cover;
      background-position: center;
      background-color: var(--navy-mid);
      margin-bottom: 1.2rem;
    }
    .featured-center h2 {
      font-family: 'The Seasons', 'Cormorant Garamond', Georgia, serif;
      font-size: 1.15rem;
      letter-spacing: .02em;
      line-height: 1.3;
      color: var(--white);
      margin-bottom: .4rem;
    }
    .featured-center .card-meta {
      font-size: .82rem;
      font-family: 'Libre Baskerville', serif;
      color: var(--white);
    }

    /* Basic mode (< 5 articles) — same structure, uniform heading sizes */
    .home-grid.is-basic .featured-center h2,
    .home-grid.is-basic .small-card h3 {
      font-family: 'The Seasons', 'Cormorant Garamond', Georgia, serif;
      font-size: 1.2rem;
      letter-spacing: .02em;
      line-height: 1.3;
      color: var(--white);
      margin-bottom: .4rem;
    }
    .home-grid.is-basic .featured-center .cover { aspect-ratio: 4 / 3; }

    /* ══ RECENT POSTS SECTION ══ */
    .recent-section {
      margin-top: 4rem;
      padding-top: 2rem;
      border-top: 1px solid rgba(255,255,255,.1);
    }
    .recent-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 1.6rem;
    }
    .recent-header h2 {
      font-family: 'The Seasons', 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(1.8rem, 2.6vw, 2.3rem);
      letter-spacing: .02em;
      color: var(--white);
    }
    .recent-header .see-all {
      font-family: 'Libre Baskerville', serif;
      font-size: .78rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--white);
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 4px;
    }
    .recent-header .see-all:hover { opacity: .75; }

    .recent-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr) .9fr;
      gap: 2rem;
      align-items: start;
    }
    .recent-card {
      display: flex;
      flex-direction: column;
      gap: .8rem;
      cursor: pointer;
      transition: opacity var(--transition);
    }
    .recent-card:hover { opacity: .82; }
    .recent-card .cover {
      aspect-ratio: 4 / 3;
      border-radius: 1rem;
      background-size: cover;
      background-position: center;
      background-color: var(--navy-mid);
    }
    .recent-card h3 {
      font-family: 'The Seasons', 'Cormorant Garamond', Georgia, serif;
      font-size: 1.35rem;
      letter-spacing: .02em;
      line-height: 1.25;
      color: var(--white);
    }
    .recent-card .card-meta {
      font-size: .78rem;
      font-family: 'Libre Baskerville', serif;
      color: var(--white);
    }

    /* Journal sidebar */
    .journal-side {
      display: flex;
      flex-direction: column;
      gap: .9rem;
      padding-top: .2rem;
    }
    .journal-side .logo-row {
      display: flex;
      align-items: center;
      gap: .6rem;
    }
    .journal-side .logo-row img {
      width: 2.4rem;
      height: 2.4rem;
      object-fit: contain;
      border-radius: .35rem;
      background: var(--navy-mid);
      padding: .15rem;
    }
    .journal-side h4 {
      font-family: 'The Seasons', 'Cormorant Garamond', Georgia, serif;
      font-size: 1.35rem;
      letter-spacing: .02em;
      color: var(--white);
    }
    .journal-side p {
      font-family: 'Libre Baskerville', serif;
      font-size: .92rem;
      line-height: 1.55;
      color: var(--white);
      opacity: .75;
    }
    .btn-pledge {
      align-self: flex-start;
      background: rgba(255,255,255,.14);
      border: 1px solid rgba(255,255,255,.18);
      color: var(--white);
      font-family: 'Libre Baskerville', serif;
      font-size: .85rem;
      font-weight: 700;
      letter-spacing: .04em;
      padding: .65rem 1.2rem;
      border-radius: var(--radius-btn);
      cursor: pointer;
      margin-top: .2rem;
      transition: background var(--transition), transform var(--transition);
    }
    .btn-pledge:hover {
      background: rgba(255,255,255,.22);
      transform: translateY(-2px);
    }

    /* Right column — most popular list */
    .home-right {}
    .popular-list { display: flex; flex-direction: column; }
    .popular-row {
      display: flex;
      gap: .9rem;
      align-items: flex-start;
      padding: .9rem 0;
      border-bottom: 1px solid rgba(255,255,255,.08);
      cursor: pointer;
      transition: opacity var(--transition);
    }
    .popular-row:last-child { border-bottom: none; }
    .popular-row:hover { opacity: .75; }
    .popular-row .info { flex: 1; min-width: 0; }
    .popular-row h4 {
      font-family: 'The Seasons', 'Cormorant Garamond', Georgia, serif;
      font-size: 1rem;
      line-height: 1.3;
      letter-spacing: .02em;
      color: var(--white);
      margin-bottom: .3rem;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .popular-row .card-meta {
      font-size: .72rem;
      font-family: 'Libre Baskerville', serif;
      color: var(--white);
    }
    .popular-row .thumb {
      width: 4.5rem;
      aspect-ratio: 4 / 3;
      border-radius: .6rem;
      background-size: cover;
      background-position: center;
      background-color: var(--navy-mid);
      flex-shrink: 0;
    }

    /* ── Archive ── */
    .archive-topbar {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.8rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid rgba(255,255,255,.1);
    }
    .archive-sort-tabs {
      display: inline-flex;
      gap: .25rem;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 2rem;
      padding: .25rem;
    }
    .archive-sort-tabs button {
      background: none;
      border: none;
      color: var(--white);
      font-family: 'Libre Baskerville', serif;
      font-size: .82rem;
      padding: .35rem 1rem;
      border-radius: 2rem;
      cursor: pointer;
      transition: opacity var(--transition), background var(--transition);
    }
    .archive-sort-tabs button.active {
      opacity: 1;
      background: rgba(255,255,255,.13);
    }
    .archive-search-btn {
      margin-left: auto;
      background: none;
      border: none;
      color: var(--white);
      cursor: pointer;
      font-size: 1.1rem;
      padding: .3rem;
      transition: opacity var(--transition);
    }
    .archive-search-btn:hover { opacity: 1; }
    .archive-search {
      display: none;
      width: 100%;
      background: rgba(255,255,255,.06);
      border: 1.5px solid rgba(255,255,255,.18);
      border-radius: var(--radius-btn);
      padding: .7rem 1.2rem;
      color: var(--white);
      font-family: 'Libre Baskerville', serif;
      font-size: .95rem;
      margin-bottom: 1.4rem;
      transition: border-color var(--transition), background var(--transition);
    }
    .archive-search.visible { display: block; }
    .archive-search::placeholder { color: #ffffff; }
    .archive-search:focus {
      outline: none;
      border-color: var(--lavender-bg);
      background: rgba(255,255,255,.09);
    }

    .archive-list { list-style: none; display: flex; flex-direction: column; }
    .archive-row {
      display: flex;
      gap: 1.6rem;
      align-items: flex-start;
      padding: 1.4rem 0;
      border-bottom: 1px solid rgba(255,255,255,.08);
      cursor: pointer;
      transition: opacity var(--transition);
      animation: fadeSlideUp .4s cubic-bezier(.4,0,.2,1) both;
    }
    .archive-row:last-child { border-bottom: none; }
    .archive-row:hover { opacity: .78; }
    .archive-row .info { flex: 1; min-width: 0; }
    .archive-row h3 {
      font-family: 'The Seasons', 'Cormorant Garamond', Georgia, serif;
      font-size: 1.35rem;
      letter-spacing: .02em;
      line-height: 1.25;
      color: var(--white);
      margin-bottom: .4rem;
    }
    .archive-row .row-meta {
      font-size: .8rem;
      font-family: 'Libre Baskerville', serif;
      color: var(--white);
      margin-bottom: .6rem;
    }
    .archive-row .row-stats {
      display: flex;
      gap: 1rem;
      font-size: .78rem;
      font-family: 'Libre Baskerville', serif;
      color: var(--white);
    }
    .archive-row .cover {
      width: 8rem;
      aspect-ratio: 4 / 3;
      border-radius: .8rem;
      background-size: cover;
      background-position: center;
      background-color: var(--navy-mid);
      flex-shrink: 0;
    }

    /* tag chips (kept for any future use) */
    .tag-chips { display: none; }
    .tag-chip {
      padding: .45rem 1rem;
      border: 1.5px solid rgba(255,255,255,.25);
      border-radius: var(--radius-btn);
      font-size: .78rem;
      font-family: 'Libre Baskerville', serif;
      letter-spacing: .04em;
      color: var(--white);
      background: transparent;
      cursor: pointer;
      transition: background var(--transition), color var(--transition),
                  border-color var(--transition);
    }
    .tag-chip:hover { border-color: var(--white); }
    .tag-chip.active {
      background: var(--lavender-bg);
      color: var(--navy);
      border-color: var(--lavender-bg);
    }

    /* ── Empty / loading states ── */
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      border: 1.5px dashed rgba(255,255,255,.2);
      border-radius: var(--radius-card);
      color: var(--white);
      font-style: italic;
    }
    .loader {
      width: 2.4rem; height: 2.4rem;
      border: 3px solid rgba(255,255,255,.15);
      border-top-color: var(--white);
      border-radius: 50%;
      animation: spin .9s linear infinite;
      margin: 3rem auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ════════════════════════════════════════════════════════════════
       OVERLAYS — composer modal
    ════════════════════════════════════════════════════════════════ */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(8,8,22,.78);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      z-index: 200;
      display: none;
      align-items: flex-start;
      justify-content: center;
      padding: 3rem 1rem;
      overflow-y: auto;
    }
    .overlay.open {
      display: flex;
      animation: fadeIn .25s ease both;
    }
    .modal {
      width: min(54rem, 100%);
      background: var(--navy);
      border: 1.5px solid rgba(255,255,255,.2);
      border-radius: var(--radius-card);
      overflow: hidden;
      position: relative;
      animation: modalIn .35s cubic-bezier(.4,0,.2,1) both;
    }
    @keyframes modalIn {
      from { opacity: 0; transform: translateY(2rem) scale(.97); }
      to   { opacity: 1; transform: none; }
    }
    .modal-close {
      position: absolute;
      top: 1rem; right: 1rem;
      width: 2.4rem; height: 2.4rem;
      border-radius: 50%;
      background: rgba(255,255,255,.1);
      border: none;
      color: var(--white);
      font-size: 1.3rem;
      cursor: pointer;
      transition: background var(--transition), transform var(--transition);
      z-index: 5;
    }
    .modal-close:hover {
      background: rgba(255,255,255,.22);
      transform: scale(1.08);
    }

    /* Composer modal */
    .composer .composer-header {
      padding: 1.6rem 2.4rem 1.2rem;
      border-bottom: 1px solid rgba(255,255,255,.12);
    }
    .composer .composer-header h2 {
      font-family: 'The Seasons', 'Cormorant Garamond', Georgia, serif;
      font-size: 1.6rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--white);
    }
    .composer form { padding: 1.8rem 2.4rem 2rem; }
    .composer label {
      display: block;
      font-family: 'Libre Baskerville', serif;
      font-size: .78rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--white);
      margin-bottom: .5rem;
    }
    .composer input[type="text"],
    .composer textarea {
      width: 100%;
      background: rgba(255,255,255,.06);
      border: 1.5px solid rgba(255,255,255,.18);
      border-radius: .8rem;
      padding: .9rem 1.1rem;
      color: var(--white);
      font-family: 'Libre Baskerville', serif;
      font-size: 1rem;
      transition: border-color var(--transition), background var(--transition);
    }
    .composer input[type="text"]:focus,
    .composer textarea:focus {
      outline: none;
      border-color: var(--lavender-bg);
      background: rgba(255,255,255,.09);
    }
    .composer .field { margin-bottom: 1.3rem; }
    .composer .title-input {
      font-family: 'The Seasons', 'Cormorant Garamond', Georgia, serif;
      font-size: 1.5rem;
      letter-spacing: .04em;
    }

    /* Cover image dropzone */
    .cover-dropzone {
      position: relative;
      width: 100%;
      max-width: 28rem;
      aspect-ratio: 4 / 3;
      border: 1.5px dashed rgba(255,255,255,.3);
      border-radius: 1rem;
      background-size: cover;
      background-position: center;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--white);
      font-style: italic;
      font-size: .9rem;
      overflow: hidden;
      transition: border-color var(--transition), background-color var(--transition),
                  transform var(--transition), box-shadow var(--transition);
    }
    .cover-dropzone:hover { border-color: var(--white); }
    .cover-dropzone.has-image { border-style: solid; border-color: rgba(255,255,255,.3); }
    .cover-dropzone.has-image .cover-prompt { display: none; }
    .cover-dropzone .cover-prompt {
      background: rgba(18,18,46,.6);
      padding: .7rem 1.3rem;
      border-radius: var(--radius-btn);
      pointer-events: none;
      z-index: 2;
    }
    .cover-dropzone input[type="file"] {
      position: absolute; inset: 0;
      opacity: 0; cursor: pointer;
      z-index: 3;
    }
    /* Drag-over state — blur backdrop + lavender border */
    .cover-dropzone.is-dragging {
      border-style: solid;
      border-color: var(--lavender-bg);
      transform: scale(1.01);
      box-shadow: 0 10px 30px rgba(207,214,245,.18);
    }
    .cover-dropzone.is-dragging::after {
      content: 'Drop to upload';
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(18,18,46,.55);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      color: var(--white);
      font-family: 'Libre Baskerville', serif;
      font-style: italic;
      font-size: 1rem;
      letter-spacing: .06em;
      z-index: 4;
      pointer-events: none;
      animation: fadeIn .2s ease both;
    }
    /* Loading state — spinner overlay while reading the file */
    .cover-dropzone.is-loading { cursor: progress; }
    .cover-dropzone.is-loading .cover-prompt { display: none; }
    .cover-dropzone.is-loading input[type="file"] { pointer-events: none; }
    .cover-dropzone.is-loading::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(18,18,46,.55);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      z-index: 4;
      pointer-events: none;
    }
    .cover-dropzone .cover-spinner {
      position: absolute;
      width: 2.4rem; height: 2.4rem;
      border: 3px solid rgba(255,255,255,.2);
      border-top-color: var(--white);
      border-radius: 50%;
      animation: spin .9s linear infinite;
      display: none;
      z-index: 5;
      pointer-events: none;
    }
    .cover-dropzone.is-loading .cover-spinner { display: block; }

    /* Tags input */
    .tag-input-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: .4rem;
      background: rgba(255,255,255,.06);
      border: 1.5px solid rgba(255,255,255,.18);
      border-radius: .8rem;
      padding: .6rem .8rem;
      align-items: center;
      transition: border-color var(--transition), background var(--transition);
    }
    .tag-input-wrap:focus-within {
      border-color: var(--lavender-bg);
      background: rgba(255,255,255,.09);
    }
    .tag-input-wrap .tag-pill {
      display: inline-flex;
      align-items: center;
      gap: .4rem;
      padding: .3rem .8rem;
      background: var(--lavender-bg);
      color: var(--navy);
      border-radius: var(--radius-btn);
      font-size: .78rem;
      letter-spacing: .04em;
      font-family: 'Libre Baskerville', serif;
      animation: fadeIn .25s ease;
    }
    .tag-input-wrap .tag-pill button {
      background: none;
      border: none;
      color: var(--navy);
      font-weight: 700;
      cursor: pointer;
      font-size: 1rem;
      line-height: 1;
      padding: 0;
    }
    .tag-input-wrap input {
      flex: 1;
      min-width: 6rem;
      background: transparent;
      border: none;
      outline: none;
      color: var(--white);
      font-family: 'Libre Baskerville', serif;
      font-size: .92rem;
      padding: .3rem 0;
    }

    /* Quill overrides — match dark palette */
    #editor {
      min-height: 22rem;
      background: rgba(255,255,255,.06);
      border-radius: 0 0 .8rem .8rem;
      color: var(--white);
      font-family: 'Libre Baskerville', serif;
      font-size: 1rem;
      line-height: 1.8;
    }
    .ql-toolbar.ql-snow {
      background: rgba(255,255,255,.06);
      border: 1.5px solid rgba(255,255,255,.18) !important;
      border-radius: .8rem .8rem 0 0;
    }
    .ql-container.ql-snow {
      border: 1.5px solid rgba(255,255,255,.18) !important;
      border-top: none !important;
      border-radius: 0 0 .8rem .8rem;
      font-family: 'Libre Baskerville', serif;
    }
    .ql-snow .ql-stroke { stroke: var(--white) !important; }
    .ql-snow .ql-fill   { fill: var(--white) !important; }
    .ql-snow .ql-picker-label { color: var(--white) !important; }
    .ql-snow .ql-picker-options {
      background: var(--navy-mid) !important;
      color: var(--white) !important;
      border: 1px solid rgba(255,255,255,.2) !important;
    }
    .ql-snow .ql-picker-item { color: var(--white) !important; }
    .ql-editor.ql-blank::before {
      color: #ffffff !important;
      font-style: italic;
    }
    .ql-editor a { color: var(--lavender-bg); }
    .ql-editor blockquote {
      border-left: 3px solid var(--lavender-bg) !important;
      color: var(--white);
    }
    .ql-editor img { border-radius: .8rem; margin: 1rem 0; }

    /* Composer footer */
    .composer-footer {
      display: flex;
      justify-content: flex-end;
      gap: .8rem;
      margin-top: 1.6rem;
      padding-top: 1.2rem;
      border-top: 1px solid rgba(255,255,255,.12);
    }
    .btn-cancel, .btn-publish {
      font-family: 'Libre Baskerville', serif;
      font-size: .85rem;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      padding: .8rem 1.6rem;
      border-radius: var(--radius-btn);
      cursor: pointer;
      transition: transform var(--transition), background var(--transition),
                  box-shadow var(--transition);
    }
    .btn-cancel {
      background: transparent;
      border: 1.5px solid rgba(255,255,255,.3);
      color: var(--white);
    }
    .btn-cancel:hover { border-color: var(--white); transform: translateY(-2px); }
    .btn-publish {
      background: var(--lavender-bg);
      color: var(--navy);
      border: 1.5px solid var(--lavender-bg);
    }
    .btn-publish:hover {
      background: var(--lavender-lt);
      transform: translateY(-2px);
      box-shadow: 0 10px 24px rgba(207,214,245,.2);
    }
    .btn-publish:disabled {
      opacity: .5;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(2rem);
      background: var(--lavender-bg);
      color: var(--navy);
      padding: .9rem 1.6rem;
      border-radius: var(--radius-btn);
      font-family: 'Libre Baskerville', serif;
      font-size: .9rem;
      font-weight: 700;
      letter-spacing: .04em;
      opacity: 0;
      pointer-events: none;
      transition: opacity .3s ease, transform .35s cubic-bezier(.4,0,.2,1);
      z-index: 300;
      box-shadow: 0 12px 36px rgba(0,0,0,.4);
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Byline avatar in cards ── */
    .card-byline {
      display: flex;
      align-items: center;
      gap: .5rem;
      font-size: .78rem;
      font-family: 'Libre Baskerville', serif;
      color: var(--white);
    }
    .byline-avatar {
      width: 1.5rem;
      height: 1.5rem;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,.25);
      object-fit: cover;
      flex-shrink: 0;
      background: var(--navy-mid);
    }
    .byline-text { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* ── Crop overlay ── */
    /* Must stack above the composer overlay (z-index 200) since it opens on top of it */
    #crop-overlay { z-index: 250; }
    .crop-modal {
      width: min(56rem, 100%);
    }
    .crop-modal .composer-header {
      padding: 1.6rem 2.4rem 1.2rem;
      border-bottom: 1px solid rgba(255,255,255,.12);
    }
    .crop-modal .composer-header h2 {
      font-family: 'The Seasons', 'Cormorant Garamond', Georgia, serif;
      font-size: 1.6rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--white);
    }
    .crop-modal .crop-body {
      padding: 1.5rem 2.4rem 2rem;
    }
    .crop-container {
      max-height: 55vh;
      overflow: hidden;
      border-radius: .8rem;
      background: rgba(0,0,0,.4);
    }
    .crop-container img {
      display: block;
      max-width: 100%;
    }
    .crop-hint {
      font-family: 'Libre Baskerville', serif;
      font-size: .78rem;
      color: var(--white);
      text-align: center;
      margin-top: .8rem;
      font-style: italic;
    }
    .crop-footer {
      display: flex;
      justify-content: flex-end;
      gap: .8rem;
      margin-top: 1.4rem;
      padding-top: 1.2rem;
      border-top: 1px solid rgba(255,255,255,.12);
    }

    /* ── Responsive ── */
    @media (max-width: 62rem) {
      .home-grid { grid-template-columns: 1fr 1.4fr; }
      .home-right { display: none; }
      .recent-grid { grid-template-columns: repeat(2, 1fr); }
      .journal-side { grid-column: 1 / -1; flex-direction: row; align-items: center; flex-wrap: wrap; gap: 1.2rem; }
      .journal-side p { flex: 1; min-width: 14rem; }
    }
    /* Featured-articles heading — only shown on mobile */
    .featured-heading { display: none; }
    @media (max-width: 48rem) {
      .featured-heading {
        display: block;
        font-family: 'The Seasons', 'Cormorant Garamond', Georgia, serif;
        font-size: 1.4rem;
        letter-spacing: .04em;
        color: var(--white);
        margin-bottom: 1rem;
      }
      /* Lock page to vertical scroll only. Cards may scroll horizontally
         inside their own containers, but the page itself must not. */
      html, body { overflow-x: hidden; }
      .home-grid { grid-template-columns: 1fr; }
      /* All cards on mobile share the same width so the layout reads
         evenly and no card visually dominates. */
      .home-left { flex-direction: row; overflow-x: auto; gap: 1rem; }
      .home-left .small-card { width: 70vw; flex: 0 0 70vw; min-width: 0; }
      .home-left .small-card .cover { aspect-ratio: 4 / 3; }
      .home-center { align-items: flex-start; }
      .featured-center { width: 70vw; }
      .featured-center .cover { aspect-ratio: 4 / 3; margin-bottom: .75rem; }
      .featured-center h2 { font-size: 1.15rem; }
      .recent-grid { grid-template-columns: 1fr; }
      .journal-side { flex-direction: column; align-items: flex-start; }
      .archive-row .cover { width: 6rem; }
      .composer form, .composer .composer-header { padding-inline: 1.6rem; }
      footer .container,
      footer p { text-align: center; }
    }
    @media (max-width: 36rem) {
      .archive-row .cover { display: none; }
      .auth-bar { flex-wrap: wrap; }
    }
  </style>
</head>
<body>

  <div data-component="nav"></div>

  <div class="container">
    <div class="journal-topbar">
      <nav class="research-tabs" id="research-tabs" role="tablist">
        <button class="active" data-view="home" role="tab">Home</button>
        <button data-view="archive" role="tab">Archive</button>
      </nav>
    </div>

    <div class="auth-bar" id="auth-bar">
      <button class="btn-new-article" id="btn-new-article" hidden>+ New Article</button>
    </div>

    <!-- ─── HOME VIEW ─── -->
    <section class="view view-home active" id="view-home">
      <div id="home-content">
        <div class="loader" aria-label="Loading"></div>
      </div>
    </section>

    <!-- ─── ARCHIVE VIEW ─── -->
    <section class="view view-archive" id="view-archive">
      <div class="archive-topbar">
        <div class="archive-sort-tabs" id="archive-sort-tabs">
          <button class="active" data-sort="latest">Latest</button>
          <button data-sort="top">Top</button>
        </div>
        <button class="archive-search-btn" id="archive-search-btn" aria-label="Search">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </button>
      </div>
      <input type="search" class="archive-search" id="archive-search" placeholder="Search articles…" />
      <div id="archive-content">
        <div class="loader" aria-label="Loading"></div>
      </div>
    </section>
  </div>

  <!-- ─── CROP OVERLAY ─── -->
  <div class="overlay" id="crop-overlay" role="dialog" aria-hidden="true">
    <div class="modal crop-modal">
      <button class="modal-close" id="crop-close" aria-label="Close">×</button>
      <div class="composer-header">
        <h2>Crop Cover Image</h2>
      </div>
      <div class="crop-body">
        <div class="crop-container">
          <img id="crop-image" src="" alt="Crop preview" />
        </div>
        <p class="crop-hint">Drag to reposition · Pinch or scroll to zoom · Resize handles to adjust</p>
        <div class="crop-footer">
          <button type="button" class="btn-cancel" id="btn-crop-cancel">Cancel</button>
          <button type="button" class="btn-publish" id="btn-crop-confirm">Use this crop</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ─── COMPOSER OVERLAY ─── -->
  <div class="overlay" id="composer-overlay" role="dialog" aria-hidden="true">
    <div class="modal composer">
      <button class="modal-close" id="composer-close" aria-label="Close">×</button>
      <div class="composer-header">
        <h2>New Article</h2>
      </div>
      <form id="composer-form">
        <div class="field">
          <label for="comp-title">Title</label>
          <input type="text" id="comp-title" class="title-input" placeholder="Untitled" required />
        </div>
        <div class="field">
          <label for="comp-subtitle">Subtitle</label>
          <input type="text" id="comp-subtitle" placeholder="A short hook for the reader" />
        </div>
        <div class="field">
          <label>Cover image</label>
          <div class="cover-dropzone" id="cover-dropzone">
            <span class="cover-prompt">Click or drop an image</span>
            <div class="cover-spinner" aria-label="Loading image"></div>
            <input type="file" id="comp-cover" accept="image/*" />
          </div>
        </div>
        <div class="field">
          <label>Tags <span aria-hidden="true">*</span></label>
          <div class="tag-input-wrap" id="tag-input-wrap">
            <input type="text" id="comp-tag-input" placeholder="Add at least one tag — type and press Enter…" />
          </div>
        </div>
        <div class="field">
          <label>Body</label>
          <div id="editor"></div>
        </div>
        <div class="composer-footer">
          <button type="button" class="btn-cancel" id="btn-cancel">Cancel</button>
          <button type="submit" class="btn-publish" id="btn-publish">Publish</button>
        </div>
      </form>
    </div>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <div data-component="footer"></div>

  <!-- Quill + markdown + image cropper -->
  <script src="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@13/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/cropperjs@1.6.2/dist/cropper.min.js"></script>

  <script type="module">
    import { loadComponents } from '/js/components.js';
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-analytics.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
    import { doc, getDoc } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";
    import { app, auth, signIn, signOut, signInErrorMessage } from '/js/firebase.js';
    import { checkAndShowProfileModal } from '/js/profile-modal.js';
    import { db, fetchArticles, publishArticle } from '/js/articles.js';

    /* Shared components (nav, footer, profile modal) must be in the DOM
       before any code below queries it. */
    await loadComponents();
    await import('/js/main.js');

    try { getAnalytics(app); } catch (e) { /* analytics fails on file:// — fine */ }

    /* ── Image helpers (no Storage — downscale + compress to data URL) ──
       Firestore docs cap at ~1 MiB. Keep covers ≤ ~180 KB and inline
       images ≤ ~120 KB so 4–5 inline images per article still fits. */
    const COVER_MAX_W = 1400;
    const INLINE_MAX_W = 1100;
    const QUALITY = 0.82;
    const MAX_BODY_BYTES = 850_000; // soft cap before publish

    const fileToCompressedDataUrl = (file, maxW = 1200, quality = QUALITY) =>
      new Promise((resolve, reject) => {
        if (!file.type.startsWith('image/')) return reject(new Error('Not an image'));
        const reader = new FileReader();
        reader.onerror = () => reject(reader.error);
        reader.onload = () => {
          const img = new Image();
          img.onerror = () => reject(new Error('Image decode failed'));
          img.onload = () => {
            const scale = Math.min(1, maxW / img.width);
            const w = Math.round(img.width * scale);
            const h = Math.round(img.height * scale);
            const canvas = document.createElement('canvas');
            canvas.width = w; canvas.height = h;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, w, h);
            // GIFs/PNGs with transparency → keep PNG; otherwise JPEG.
            const isPng = file.type === 'image/png' || file.type === 'image/gif';
            const mime = isPng ? 'image/png' : 'image/jpeg';
            resolve(canvas.toDataURL(mime, quality));
          };
          img.src = reader.result;
        };
        reader.readAsDataURL(file);
      });

    /* ── App state ── */
    const state = {
      user: null,
      isAuthor: false,
      authorSchool: '',
      articles: [],
      activeTag: null,
    };

    const openReader = (id) => {
      window.location.href = `article.html?id=${encodeURIComponent(id)}`;
    };

    /* ── Element refs ── */
    const $ = (id) => document.getElementById(id);
    const els = {
      authBar:       $('auth-bar'),
      btnSignin:     $('btn-signin'),
      btnSignout:    $('btn-signout'),
      navUserWrap:   $('nav-user-wrap'),
      navUserChip:   $('nav-user-chip'),
      btnNewArticle: $('btn-new-article'),
      tabs:          document.querySelectorAll('.research-tabs button'),
      viewHome:      $('view-home'),
      viewArchive:   $('view-archive'),
      homeContent:   $('home-content'),
      archiveContent:$('archive-content'),
      archiveSearch: $('archive-search'),
      composerOverlay: $('composer-overlay'),
      composerClose: $('composer-close'),
      composerForm:  $('composer-form'),
      compTitle:     $('comp-title'),
      compSubtitle:  $('comp-subtitle'),
      compCover:     $('comp-cover'),
      coverDropzone: $('cover-dropzone'),
      tagInputWrap:  $('tag-input-wrap'),
      compTagInput:  $('comp-tag-input'),
      btnCancel:     $('btn-cancel'),
      btnPublish:    $('btn-publish'),
      toast:         $('toast'),
    };

    /* ── Util ── */
    const fmtDate = (ts) => {
      if (!ts) return '';
      const d = ts.toDate ? ts.toDate() : new Date(ts);
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    };
    const escapeHtml = (s = '') => s.replace(/[&<>"']/g, c =>
      ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    const showToast = (msg) => {
      els.toast.textContent = msg;
      els.toast.classList.add('show');
      clearTimeout(showToast._t);
      showToast._t = setTimeout(() => els.toast.classList.remove('show'), 2400);
    };
    const openOverlay = (overlay) => {
      overlay.classList.add('open');
      overlay.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
    };
    const closeOverlay = (overlay) => {
      overlay.classList.remove('open');
      overlay.setAttribute('aria-hidden', 'true');
      document.body.style.overflow = '';
    };

    /* ════════════════════════════════════════════════════════
       AUTH
    ════════════════════════════════════════════════════════ */
    els.btnSignin.addEventListener('click', async () => {
      try {
        await signIn();
      } catch (e) {
        console.error(e);
        const msg = signInErrorMessage(e);
        if (msg) showToast(msg);
      }
    });

    els.btnSignout.addEventListener('click', () => signOut());

    const renderAuthBar = () => {
      if (state.user) {
        els.btnSignin.hidden = true;
        els.navUserWrap.hidden = false;
        els.navUserChip.innerHTML = `
          <img src="${state.user.photoURL || ''}" alt="" />
          <div><div class="name">${escapeHtml(state.user.displayName || 'Reader')}</div></div>
        `;
        els.btnNewArticle.hidden = !state.isAuthor;
      } else {
        els.btnSignin.hidden = false;
        els.navUserWrap.hidden = true;
        els.btnNewArticle.hidden = true;
      }
    };

    onAuthStateChanged(auth, async (user) => {
      state.user = user;
      state.isAuthor = false;
      state.authorSchool = '';
      if (user) {
        checkAndShowProfileModal(user, app);
        try {
          const [authorDoc, userDoc] = await Promise.all([
            getDoc(doc(db, 'authors', user.uid)),
            getDoc(doc(db, 'users', user.uid)),
          ]);
          state.isAuthor = authorDoc.exists();
          if (userDoc.exists()) state.authorSchool = userDoc.data().schoolName || '';
        } catch (e) { console.warn('author check failed', e); }
      }
      renderAuthBar();
    });

    /* ════════════════════════════════════════════════════════
       TABS
    ════════════════════════════════════════════════════════ */
    els.tabs.forEach(btn => {
      btn.addEventListener('click', () => {
        els.tabs.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const view = btn.dataset.view;
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(`view-${view}`).classList.add('active');
      });
    });

    /* ════════════════════════════════════════════════════════
       FETCH ARTICLES
    ════════════════════════════════════════════════════════ */
    const loadArticles = async () => {
      try {
        state.articles = await fetchArticles({ limit: 60 });
      } catch (e) {
        console.error('load articles failed', e);
        state.articles = [];
      }
      renderHome();
      renderArchive();
      renderTagChips();
    };

    /* ════════════════════════════════════════════════════════
       RENDER — HOME
    ════════════════════════════════════════════════════════ */
    const renderHome = () => {
      if (!state.articles.length) {
        els.homeContent.innerHTML = `
          <div class="empty-state">
            No articles yet. ${state.isAuthor ? 'Click <strong>+ New Article</strong> to write the first one.' : 'Check back soon.'}
          </div>`;
        return;
      }

      const isBasic = state.articles.length < 5;

      const featured = state.articles[0];
      const leftArticles = state.articles.slice(1, 3);
      const popularArticles = [...state.articles]
        .sort((a, b) => (b.likeCount || 0) - (a.likeCount || 0))
        .slice(0, 6);
      const recentArticles = state.articles.slice(3, 6);

      const smallCardHtml = (a) => `
        <article class="small-card" data-id="${a.id}">
          <div class="cover" ${a.coverUrl ? `style="background-image:url('${escapeHtml(a.coverUrl)}')"` : ''}></div>
          <h3>${escapeHtml(a.title || 'Untitled')}</h3>
          <div class="card-byline">
            ${a.authorPhoto ? `<img class="byline-avatar" src="${escapeHtml(a.authorPhoto)}" alt="" />` : ''}
            <span class="byline-text">${escapeHtml(a.authorName || 'Anonymous')}${a.authorSchool ? ' · ' + escapeHtml(a.authorSchool) : ''} · ${fmtDate(a.createdAt)}</span>
          </div>
        </article>`;

      const featuredCoverStyle = featured.coverUrl
        ? `style="background-image:url('${escapeHtml(featured.coverUrl)}')"` : '';

      const popularRowHtml = (a) => `
        <div class="popular-row" data-id="${a.id}">
          <div class="info">
            <h4>${escapeHtml(a.title || 'Untitled')}</h4>
            <div class="card-meta">${fmtDate(a.createdAt)} · URBANBEARS</div>
          </div>
          <div class="thumb" ${a.coverUrl ? `style="background-image:url('${escapeHtml(a.coverUrl)}')"` : ''}></div>
        </div>`;

      const recentCardHtml = (a) => `
        <article class="recent-card" data-id="${a.id}">
          <div class="cover" ${a.coverUrl ? `style="background-image:url('${escapeHtml(a.coverUrl)}')"` : ''}></div>
          <h3>${escapeHtml(a.title || 'Untitled')}</h3>
          <div class="card-byline">
            ${a.authorPhoto ? `<img class="byline-avatar" src="${escapeHtml(a.authorPhoto)}" alt="" />` : ''}
            <span class="byline-text">${escapeHtml(a.authorName || 'Anonymous')}${a.authorSchool ? ' · ' + escapeHtml(a.authorSchool) : ''} · ${fmtDate(a.createdAt)}</span>
          </div>
        </article>`;

      const journalSideHtml = `
        <aside class="journal-side">
          <div class="logo-row">
            <img src="/assets/images/logo/urbanbearlogo.png" alt="Urban BEARS" />
            <h4>The BEARS Journal</h4>
          </div>
          <p>Inspiring the next generation of biomedical engineers and scientists.</p>
          <button class="btn-pledge" type="button">Pledge your support</button>
        </aside>`;

      const recentSectionHtml = (!isBasic && recentArticles.length) ? `
        <section class="recent-section">
          <div class="recent-header">
            <h2>Recent posts</h2>
            <span class="see-all" data-action="see-all">See all</span>
          </div>
          <div class="recent-grid">
            ${recentArticles.map(recentCardHtml).join('')}
            ${journalSideHtml}
          </div>
        </section>` : '';

      els.homeContent.innerHTML = `
        <div class="home-grid${isBasic ? ' is-basic' : ''}">
          <div class="home-left">
            ${leftArticles.length ? leftArticles.map(smallCardHtml).join('') : ''}
          </div>
          <div class="home-center">
            <h2 class="featured-heading">Featured Articles</h2>
            <article class="featured-center" data-id="${featured.id}">
              <div class="cover" ${featuredCoverStyle}></div>
              <h2>${escapeHtml(featured.title || 'Untitled')}</h2>
              <div class="card-byline">
                ${featured.authorPhoto ? `<img class="byline-avatar" src="${escapeHtml(featured.authorPhoto)}" alt="" />` : ''}
                <span class="byline-text">${escapeHtml(featured.authorName || 'Anonymous')}${featured.authorSchool ? ' · ' + escapeHtml(featured.authorSchool) : ''} · ${fmtDate(featured.createdAt)}</span>
              </div>
            </article>
          </div>
          <div class="home-right">
            <div class="section-label">Most Popular <span class="see-all" data-action="see-all">View all</span></div>
            <div class="popular-list">
              ${popularArticles.map(popularRowHtml).join('')}
            </div>
          </div>
        </div>
        ${recentSectionHtml}`;

      els.homeContent.querySelectorAll('[data-id]').forEach(node => {
        node.addEventListener('click', () => openReader(node.dataset.id));
      });
      els.homeContent.querySelectorAll('[data-action="see-all"]').forEach(el => {
        el.addEventListener('click', (e) => {
          e.stopPropagation();
          document.querySelector('.research-tabs [data-view="archive"]').click();
        });
      });
    };

    /* ════════════════════════════════════════════════════════
       RENDER — ARCHIVE
    ════════════════════════════════════════════════════════ */
    const renderTagChips = () => {}; // no-op — tag UI removed

    let archiveSort = 'latest'; // 'latest' | 'top'

    const renderArchive = () => {
      const search = (els.archiveSearch.value || '').trim().toLowerCase();
      let list = [...state.articles];
      if (archiveSort === 'top') list.sort((a, b) => (b.likeCount || 0) - (a.likeCount || 0));
      if (search) {
        list = list.filter(a =>
          (a.title || '').toLowerCase().includes(search) ||
          (a.subtitle || '').toLowerCase().includes(search) ||
          (a.authorName || '').toLowerCase().includes(search)
        );
      }
      if (!list.length) {
        els.archiveContent.innerHTML = `<div class="empty-state">No articles match.</div>`;
        return;
      }
      els.archiveContent.innerHTML = `
        <ul class="archive-list">
          ${list.map((a, i) => `
            <li class="archive-row" data-id="${a.id}" style="animation-delay:${i * 0.04}s">
              <div class="info">
                <h3>${escapeHtml(a.title || 'Untitled')}</h3>
                <div class="row-meta card-byline">
                  ${a.authorPhoto ? `<img class="byline-avatar" src="${escapeHtml(a.authorPhoto)}" alt="" />` : ''}
                  <span class="byline-text">${escapeHtml(a.authorName || 'Anonymous')}${a.authorSchool ? ' · ' + escapeHtml(a.authorSchool) : ''} · ${fmtDate(a.createdAt)} · URBANBEARS</span>
                </div>
                <div class="row-stats">
                  <span>♥ ${a.likeCount || 0}</span>
                  <span>↻ ${a.repostCount || 0}</span>
                </div>
              </div>
              <div class="cover" ${a.coverUrl ? `style="background-image:url('${escapeHtml(a.coverUrl)}')"` : ''}></div>
            </li>`).join('')}
        </ul>`;
      els.archiveContent.querySelectorAll('[data-id]').forEach(node => {
        node.addEventListener('click', () => openReader(node.dataset.id));
      });
    };

    els.archiveSearch.addEventListener('input', renderArchive);

    // Sort tab toggle
    document.getElementById('archive-sort-tabs').querySelectorAll('button').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('#archive-sort-tabs button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        archiveSort = btn.dataset.sort;
        renderArchive();
      });
    });

    // Search icon toggle
    document.getElementById('archive-search-btn').addEventListener('click', () => {
      els.archiveSearch.classList.toggle('visible');
      if (els.archiveSearch.classList.contains('visible')) els.archiveSearch.focus();
    });

    /* ════════════════════════════════════════════════════════
       COMPOSER (authors only)
    ════════════════════════════════════════════════════════ */
    let quill = null;
    let coverDataUrl = '';
    const tags = new Set();

    const initQuill = () => {
      if (quill) return;
      const toolbar = [
        [{ header: [1, 2, 3, false] }],
        ['bold', 'italic', 'underline', 'strike'],
        [{ list: 'ordered' }, { list: 'bullet' }],
        ['blockquote', 'code-block'],
        ['link', 'image'],
        ['clean']
      ];
      quill = new Quill('#editor', {
        theme: 'snow',
        placeholder: 'Paste your article here. Any markdown or formatting should automatically render.',
        modules: { toolbar }
      });

      // Custom image handler — compresses client-side and embeds as data URL
      // (No Firebase Storage — keeps the app on the free Spark plan.)
      quill.getModule('toolbar').addHandler('image', () => {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.click();
        input.onchange = async () => {
          const file = input.files?.[0];
          if (!file) return;
          showToast('Embedding image…');
          try {
            const dataUrl = await fileToCompressedDataUrl(file, INLINE_MAX_W);
            const range = quill.getSelection(true) || { index: quill.getLength() };
            quill.insertEmbed(range.index, 'image', dataUrl, 'user');
            quill.setSelection(range.index + 1);
            showToast('Image inserted');
          } catch (e) {
            console.error(e);
            showToast('Image embed failed');
          }
        };
      });

      // Markdown-on-paste — when plain text contains markdown syntax,
      // run it through marked.js and paste as formatted HTML
      const markdownRegex = /(^|\n)\s*(#{1,6}\s|[-*+]\s|\d+\.\s|>\s)|(\*\*[^*]+\*\*)|(__[^_]+__)|(\*[^*]+\*)|(_[^_]+_)|(`[^`]+`)|(\[[^\]]+\]\([^\)]+\))|(^```)/m;
      quill.root.addEventListener('paste', (e) => {
        const cd = e.clipboardData;
        if (!cd) return;
        const html = cd.getData('text/html');
        const text = cd.getData('text/plain');
        if (html) return; // rich paste — let Quill handle
        if (!text || !markdownRegex.test(text)) return;
        e.preventDefault();
        e.stopImmediatePropagation();
        const rendered = DOMPurify.sanitize(marked.parse(text));
        const range = quill.getSelection(true) || { index: quill.getLength(), length: 0 };
        if (range.length) quill.deleteText(range.index, range.length, 'user');
        quill.clipboard.dangerouslyPasteHTML(range.index, rendered, 'user');
      }, true);
    };

    const resetComposer = () => {
      els.composerForm.reset();
      coverDataUrl = '';
      els.coverDropzone.style.backgroundImage = '';
      els.coverDropzone.classList.remove('has-image');
      tags.clear();
      renderTagPills();
      if (quill) quill.setText('');
    };

    const renderTagPills = () => {
      // Remove existing pills, keep input
      els.tagInputWrap.querySelectorAll('.tag-pill').forEach(n => n.remove());
      [...tags].forEach(t => {
        const pill = document.createElement('span');
        pill.className = 'tag-pill';
        pill.innerHTML = `${escapeHtml(t)} <button type="button" aria-label="Remove">×</button>`;
        pill.querySelector('button').addEventListener('click', () => {
          tags.delete(t);
          renderTagPills();
        });
        els.tagInputWrap.insertBefore(pill, els.compTagInput);
      });
    };

    els.compTagInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ',') {
        e.preventDefault();
        const v = els.compTagInput.value.trim().replace(/,$/, '');
        if (v) {
          tags.add(v);
          renderTagPills();
          els.tagInputWrap.style.borderColor = '';
        }
        els.compTagInput.value = '';
      } else if (e.key === 'Backspace' && !els.compTagInput.value && tags.size) {
        const last = [...tags].pop();
        tags.delete(last);
        renderTagPills();
      }
    });

    /* ── Cover image crop flow ── */
    let cropperInstance = null;

    const openCropModal = (rawDataUrl) => {
      const cropImg = document.getElementById('crop-image');
      openOverlay(document.getElementById('crop-overlay'));

      // Destroy previous cropper before creating a new one
      if (cropperInstance) { cropperInstance.destroy(); cropperInstance = null; }

      const initCropper = () => {
        if (cropperInstance) return;
        cropperInstance = new Cropper(cropImg, {
          aspectRatio: 4 / 3,
          viewMode: 1,
          autoCropArea: 1,
          movable: true,
          zoomable: true,
          rotatable: false,
          scalable: false,
          background: false,
        });
      };

      // Wire onload BEFORE setting src so we don't miss the event
      cropImg.onload = initCropper;
      cropImg.onerror = () => {
        showToast('Could not load image');
        closeOverlay(document.getElementById('crop-overlay'));
      };
      cropImg.src = rawDataUrl;
      // Data URL may already be decoded if same src — trigger manually
      if (cropImg.complete && cropImg.naturalWidth > 0) initCropper();
    };

    document.getElementById('btn-crop-confirm').addEventListener('click', () => {
      if (!cropperInstance) return;
      const canvas = cropperInstance.getCroppedCanvas({ width: COVER_MAX_W, imageSmoothingQuality: 'high' });
      coverDataUrl = canvas.toDataURL('image/jpeg', QUALITY);
      els.coverDropzone.style.backgroundImage = `url('${coverDataUrl}')`;
      els.coverDropzone.classList.add('has-image');
      closeOverlay(document.getElementById('crop-overlay'));
      cropperInstance.destroy();
      cropperInstance = null;
    });

    const cancelCrop = () => {
      closeOverlay(document.getElementById('crop-overlay'));
      if (cropperInstance) { cropperInstance.destroy(); cropperInstance = null; }
      // Reset file input so the user can re-pick
      els.compCover.value = '';
    };
    document.getElementById('crop-close').addEventListener('click', cancelCrop);
    document.getElementById('btn-crop-cancel').addEventListener('click', cancelCrop);

    const handleCoverFile = async (file) => {
      if (!file) return;
      if (!file.type.startsWith('image/')) {
        showToast('Please choose an image file');
        return;
      }
      els.coverDropzone.classList.add('is-loading');
      try {
        const rawUrl = await new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onerror = () => reject(reader.error);
          reader.onload = () => resolve(reader.result);
          reader.readAsDataURL(file);
        });
        openCropModal(rawUrl);
      } catch (e) {
        console.error(e);
        showToast('Could not load image');
      } finally {
        els.coverDropzone.classList.remove('is-loading');
        // Reset so picking the same file again still fires `change`
        els.compCover.value = '';
      }
    };

    els.compCover.addEventListener('change', () => {
      handleCoverFile(els.compCover.files?.[0]);
    });

    /* ── Drag & drop handlers ── */
    let dragDepth = 0;
    const isFileDrag = (e) => Array.from(e.dataTransfer?.types || []).includes('Files');

    els.coverDropzone.addEventListener('dragenter', (e) => {
      if (!isFileDrag(e)) return;
      e.preventDefault();
      dragDepth++;
      els.coverDropzone.classList.add('is-dragging');
    });
    els.coverDropzone.addEventListener('dragover', (e) => {
      if (!isFileDrag(e)) return;
      e.preventDefault();
      e.dataTransfer.dropEffect = 'copy';
    });
    els.coverDropzone.addEventListener('dragleave', (e) => {
      if (!isFileDrag(e)) return;
      dragDepth = Math.max(0, dragDepth - 1);
      if (dragDepth === 0) els.coverDropzone.classList.remove('is-dragging');
    });
    els.coverDropzone.addEventListener('drop', (e) => {
      if (!isFileDrag(e)) return;
      e.preventDefault();
      dragDepth = 0;
      els.coverDropzone.classList.remove('is-dragging');
      const file = e.dataTransfer.files?.[0];
      handleCoverFile(file);
    });

    // Swallow drops that miss the dropzone but happen over the modal,
    // so the browser doesn't navigate to the image file.
    ['dragover', 'drop'].forEach(ev => {
      els.composerOverlay.addEventListener(ev, (e) => {
        if (isFileDrag(e)) e.preventDefault();
      });
    });

    const openComposer = () => {
      if (!state.isAuthor) return;
      resetComposer();
      initQuill();
      openOverlay(els.composerOverlay);
    };
    els.btnNewArticle.addEventListener('click', openComposer);

    const closeComposer = () => {
      closeOverlay(els.composerOverlay);
      resetComposer();
    };
    els.composerClose.addEventListener('click', closeComposer);
    els.btnCancel.addEventListener('click', closeComposer);
    els.composerOverlay.addEventListener('click', (e) => {
      if (e.target === els.composerOverlay) closeComposer();
    });

    els.composerForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      if (!state.user || !state.isAuthor) {
        showToast('Authors only');
        return;
      }
      const title = els.compTitle.value.trim();
      const subtitle = els.compSubtitle.value.trim();
      const body = DOMPurify.sanitize(quill.root.innerHTML);
      if (!title) { showToast('Title required'); return; }
      if (!coverDataUrl) { showToast('Cover image required'); els.coverDropzone.style.outline = '2px solid rgba(255,160,160,.7)'; return; }
      els.coverDropzone.style.outline = '';
      if (!tags.size) {
        showToast('At least one tag required');
        els.tagInputWrap.style.borderColor = 'rgba(255,160,160,.7)';
        els.compTagInput.focus();
        return;
      }
      els.tagInputWrap.style.borderColor = '';
      if (quill.getText().trim().length < 1) { showToast('Body required'); return; }

      // Firestore caps docs at ~1 MiB. Estimate the payload before sending.
      const approxBytes = (body.length + (coverDataUrl?.length || 0)) * 0.75;
      if (approxBytes > MAX_BODY_BYTES) {
        showToast('Article too large — remove or shrink some images');
        return;
      }

      els.btnPublish.disabled = true;
      els.btnPublish.textContent = 'Publishing…';

      try {
        await publishArticle({
          title,
          subtitle,
          body,
          coverUrl: coverDataUrl || '',
          tags: [...tags],
          authorUid: state.user.uid,
          authorName: state.user.displayName || 'Anonymous',
          authorPhoto: state.user.photoURL || '',
          authorSchool: state.authorSchool || '',
        });
        showToast('Published!');
        closeComposer();
        await loadArticles();
      } catch (err) {
        console.error(err);
        showToast('Publish failed — check console');
      } finally {
        els.btnPublish.disabled = false;
        els.btnPublish.textContent = 'Publish';
      }
    });

    /* ════════════════════════════════════════════════════════
       ESC to close any overlay
    ════════════════════════════════════════════════════════ */
    document.addEventListener('keydown', (e) => {
      if (e.key !== 'Escape') return;
      if (document.getElementById('crop-overlay').classList.contains('open')) cancelCrop();
      else if (els.composerOverlay.classList.contains('open')) closeComposer();
    });

    /* ── Bootstrap ── */
    loadArticles();
  </script>

  <!-- ── Profile Setup Modal ── -->
  <div data-component="profile-modal"></div>

</body>
</html>
