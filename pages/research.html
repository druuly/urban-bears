<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Research — Urban BEARS</title>

  <link href="https://fonts.cdnfonts.com/css/the-seasons" rel="stylesheet" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="../css/base.css" />
  <link rel="stylesheet" href="../css/animations.css" />

  <!-- Quill 2.x editor -->
  <link href="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.snow.css" rel="stylesheet" />

  <style>
    /* ════════════════════════════════════════════════════════════════
       RESEARCH JOURNAL — Substack-style system
       All custom typography stays white-on-navy or navy-on-lavender,
       per project palette. No grey body fonts.
    ════════════════════════════════════════════════════════════════ */

    /* ── Auth bar (+ New Article for authors) ── */
    .auth-bar {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 1rem;
      padding: .6rem 0 .2rem;
      min-height: 2rem;
    }
    .btn-signin, .btn-new-article {
      font-family: 'Libre Baskerville', serif;
      font-size: .82rem;
      font-weight: 700;
      letter-spacing: .05em;
      text-transform: uppercase;
      padding: .7rem 1.4rem;
      border-radius: var(--radius-btn);
      border: 1.5px solid var(--white);
      background: transparent;
      color: var(--white);
      cursor: pointer;
      transition: background var(--transition), color var(--transition),
                  transform var(--transition);
    }
    .btn-signin:hover {
      background: var(--white);
      color: var(--navy);
      transform: translateY(-2px);
    }
    .btn-new-article {
      background: var(--lavender-bg);
      color: var(--navy);
      border-color: var(--lavender-bg);
    }
    .btn-new-article:hover {
      background: var(--lavender-lt);
      transform: translateY(-2px);
      box-shadow: 0 8px 22px rgba(207,214,245,.18);
    }
    .user-chip {
      display: flex;
      align-items: center;
      gap: .7rem;
      padding: .35rem .9rem .35rem .35rem;
      border: 1.5px solid rgba(255,255,255,.25);
      border-radius: var(--radius-btn);
      color: var(--white);
      font-family: 'Libre Baskerville', serif;
      font-size: .9rem;
      animation: fadeIn .4s ease both;
    }
    .user-chip img {
      width: 2rem; height: 2rem; border-radius: 50%;
      border: 1.5px solid var(--white);
    }
    .user-chip .name { font-weight: 700; }
    .user-chip .role {
      font-size: .7rem;
      font-style: italic;
      opacity: .85;
      letter-spacing: .04em;
    }

    /* ── Journal header bar ── */
    .journal-topbar {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.8rem 0 0;
      gap: 1rem;
      position: relative;
    }

    /* ── Tabs — pill style ── */
    .research-tabs {
      display: inline-flex;
      gap: .3rem;
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 2rem;
      padding: .3rem;
    }
    .research-tabs button {
      background: none;
      border: none;
      color: var(--white);
      font-family: 'Libre Baskerville', serif;
      font-size: .88rem;
      letter-spacing: .04em;
      padding: .45rem 1.3rem;
      border-radius: 2rem;
      cursor: pointer;
      opacity: .65;
      transition: opacity var(--transition), background var(--transition), color var(--transition);
    }
    .research-tabs button:hover { opacity: .9; }
    .research-tabs button.active {
      opacity: 1;
      background: rgba(255,255,255,.15);
      color: var(--white);
    }

    /* ── View switcher ── */
    .view { display: none; padding: 2rem 0 5rem; }
    .view.active {
      display: block;
      animation: fadeSlideUp .55s cubic-bezier(.4,0,.2,1) both;
    }

    /* ── Section labels ── */
    .section-label {
      font-family: 'Libre Baskerville', serif;
      font-size: .75rem;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--white);
      opacity: .6;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: .8rem;
    }
    .section-label .see-all {
      margin-left: auto;
      font-size: .72rem;
      opacity: .7;
      cursor: pointer;
      letter-spacing: .08em;
      text-decoration: underline;
      text-underline-offset: 3px;
    }
    .section-label .see-all:hover { opacity: 1; }

    /* ══ HOME 3-COLUMN GRID ══ */
    .home-grid {
      display: grid;
      grid-template-columns: 1fr 1.7fr 1fr;
      gap: 2rem;
      align-items: start;
    }

    /* Left column — small stacked cards */
    .home-left { display: flex; flex-direction: column; gap: 1.6rem; }
    .small-card {
      display: flex;
      flex-direction: column;
      cursor: pointer;
      gap: .75rem;
      transition: opacity var(--transition);
    }
    .small-card:hover { opacity: .82; }
    .small-card .cover {
      aspect-ratio: 4 / 3;
      border-radius: 1rem;
      background-size: cover;
      background-position: center;
      background-color: var(--navy-mid);
    }
    .small-card h3 {
      font-family: 'The Seasons', 'Cormorant Garamond', Georgia, serif;
      font-size: 1.15rem;
      line-height: 1.3;
      letter-spacing: .02em;
      color: var(--white);
    }
    .small-card .card-meta {
      font-size: .78rem;
      font-family: 'Libre Baskerville', serif;
      color: var(--white);
      opacity: .6;
    }

    /* Center column — featured large */
    .home-center { display: flex; flex-direction: column; gap: 0; }
    .featured-center {
      cursor: pointer;
      transition: opacity var(--transition);
    }
    .featured-center:hover { opacity: .88; }
    .featured-center .cover {
      aspect-ratio: 4 / 3;
      border-radius: 1.2rem;
      background-size: cover;
      background-position: center;
      background-color: var(--navy-mid);
      margin-bottom: 1.2rem;
    }
    .featured-center h2 {
      font-family: 'The Seasons', 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(1.6rem, 2.5vw, 2.2rem);
      letter-spacing: .03em;
      line-height: 1.2;
      color: var(--white);
      margin-bottom: .5rem;
    }
    .featured-center .card-meta {
      font-size: .82rem;
      font-family: 'Libre Baskerville', serif;
      color: var(--white);
      opacity: .65;
    }

    /* Right column — most popular list */
    .home-right {}
    .popular-list { display: flex; flex-direction: column; }
    .popular-row {
      display: flex;
      gap: .9rem;
      align-items: flex-start;
      padding: .9rem 0;
      border-bottom: 1px solid rgba(255,255,255,.08);
      cursor: pointer;
      transition: opacity var(--transition);
    }
    .popular-row:last-child { border-bottom: none; }
    .popular-row:hover { opacity: .75; }
    .popular-row .info { flex: 1; min-width: 0; }
    .popular-row h4 {
      font-family: 'The Seasons', 'Cormorant Garamond', Georgia, serif;
      font-size: 1rem;
      line-height: 1.3;
      letter-spacing: .02em;
      color: var(--white);
      margin-bottom: .3rem;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .popular-row .card-meta {
      font-size: .72rem;
      font-family: 'Libre Baskerville', serif;
      color: var(--white);
      opacity: .55;
    }
    .popular-row .thumb {
      width: 3.8rem;
      aspect-ratio: 1;
      border-radius: .6rem;
      background-size: cover;
      background-position: center;
      background-color: var(--navy-mid);
      flex-shrink: 0;
    }

    /* ── Archive ── */
    .archive-topbar {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.8rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid rgba(255,255,255,.1);
    }
    .archive-sort-tabs {
      display: inline-flex;
      gap: .25rem;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 2rem;
      padding: .25rem;
    }
    .archive-sort-tabs button {
      background: none;
      border: none;
      color: var(--white);
      font-family: 'Libre Baskerville', serif;
      font-size: .82rem;
      padding: .35rem 1rem;
      border-radius: 2rem;
      cursor: pointer;
      opacity: .55;
      transition: opacity var(--transition), background var(--transition);
    }
    .archive-sort-tabs button.active {
      opacity: 1;
      background: rgba(255,255,255,.13);
    }
    .archive-search-btn {
      margin-left: auto;
      background: none;
      border: none;
      color: var(--white);
      opacity: .6;
      cursor: pointer;
      font-size: 1.1rem;
      padding: .3rem;
      transition: opacity var(--transition);
    }
    .archive-search-btn:hover { opacity: 1; }
    .archive-search {
      display: none;
      width: 100%;
      background: rgba(255,255,255,.06);
      border: 1.5px solid rgba(255,255,255,.18);
      border-radius: var(--radius-btn);
      padding: .7rem 1.2rem;
      color: var(--white);
      font-family: 'Libre Baskerville', serif;
      font-size: .95rem;
      margin-bottom: 1.4rem;
      transition: border-color var(--transition), background var(--transition);
    }
    .archive-search.visible { display: block; }
    .archive-search::placeholder { color: rgba(255,255,255,.45); }
    .archive-search:focus {
      outline: none;
      border-color: var(--lavender-bg);
      background: rgba(255,255,255,.09);
    }

    .archive-list { list-style: none; display: flex; flex-direction: column; }
    .archive-row {
      display: flex;
      gap: 1.6rem;
      align-items: flex-start;
      padding: 1.4rem 0;
      border-bottom: 1px solid rgba(255,255,255,.08);
      cursor: pointer;
      transition: opacity var(--transition);
      animation: fadeSlideUp .4s cubic-bezier(.4,0,.2,1) both;
    }
    .archive-row:last-child { border-bottom: none; }
    .archive-row:hover { opacity: .78; }
    .archive-row .info { flex: 1; min-width: 0; }
    .archive-row h3 {
      font-family: 'The Seasons', 'Cormorant Garamond', Georgia, serif;
      font-size: 1.35rem;
      letter-spacing: .02em;
      line-height: 1.25;
      color: var(--white);
      margin-bottom: .4rem;
    }
    .archive-row .row-meta {
      font-size: .8rem;
      font-family: 'Libre Baskerville', serif;
      color: var(--white);
      opacity: .6;
      margin-bottom: .6rem;
    }
    .archive-row .row-stats {
      display: flex;
      gap: 1rem;
      font-size: .78rem;
      font-family: 'Libre Baskerville', serif;
      color: var(--white);
      opacity: .5;
    }
    .archive-row .cover {
      width: 8rem;
      aspect-ratio: 4 / 3;
      border-radius: .8rem;
      background-size: cover;
      background-position: center;
      background-color: var(--navy-mid);
      flex-shrink: 0;
    }

    /* tag chips (kept for any future use) */
    .tag-chips { display: none; }
    .tag-chip {
      padding: .45rem 1rem;
      border: 1.5px solid rgba(255,255,255,.25);
      border-radius: var(--radius-btn);
      font-size: .78rem;
      font-family: 'Libre Baskerville', serif;
      letter-spacing: .04em;
      color: var(--white);
      background: transparent;
      cursor: pointer;
      transition: background var(--transition), color var(--transition),
                  border-color var(--transition);
    }
    .tag-chip:hover { border-color: var(--white); }
    .tag-chip.active {
      background: var(--lavender-bg);
      color: var(--navy);
      border-color: var(--lavender-bg);
    }

    /* ── Empty / loading states ── */
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      border: 1.5px dashed rgba(255,255,255,.2);
      border-radius: var(--radius-card);
      color: var(--white);
      opacity: .7;
      font-style: italic;
    }
    .loader {
      width: 2.4rem; height: 2.4rem;
      border: 3px solid rgba(255,255,255,.15);
      border-top-color: var(--white);
      border-radius: 50%;
      animation: spin .9s linear infinite;
      margin: 3rem auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ════════════════════════════════════════════════════════════════
       OVERLAYS — reader + composer modals
    ════════════════════════════════════════════════════════════════ */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(8,8,22,.78);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      z-index: 200;
      display: none;
      align-items: flex-start;
      justify-content: center;
      padding: 3rem 1rem;
      overflow-y: auto;
    }
    .overlay.open {
      display: flex;
      animation: fadeIn .25s ease both;
    }
    .modal {
      width: min(54rem, 100%);
      background: var(--navy);
      border: 1.5px solid rgba(255,255,255,.2);
      border-radius: var(--radius-card);
      overflow: hidden;
      position: relative;
      animation: modalIn .35s cubic-bezier(.4,0,.2,1) both;
    }
    @keyframes modalIn {
      from { opacity: 0; transform: translateY(2rem) scale(.97); }
      to   { opacity: 1; transform: none; }
    }
    .modal-close {
      position: absolute;
      top: 1rem; right: 1rem;
      width: 2.4rem; height: 2.4rem;
      border-radius: 50%;
      background: rgba(255,255,255,.1);
      border: none;
      color: var(--white);
      font-size: 1.3rem;
      cursor: pointer;
      transition: background var(--transition), transform var(--transition);
      z-index: 5;
    }
    .modal-close:hover {
      background: rgba(255,255,255,.22);
      transform: scale(1.08);
    }

    /* Reader modal */
    .reader .reader-cover {
      width: 100%;
      aspect-ratio: 21 / 9;
      background-size: cover;
      background-position: center;
      background-color: var(--navy-mid);
    }
    .reader .reader-body {
      padding: 2.6rem 3rem 3rem;
    }
    .reader .eyebrow {
      font-family: 'Libre Baskerville', serif;
      font-size: .78rem;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--lavender-bg);
      margin-bottom: 1rem;
    }
    .reader h2 {
      font-family: 'The Seasons', 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(1.9rem, 3.4vw, 2.8rem);
      letter-spacing: .04em;
      color: var(--white);
      margin-bottom: .8rem;
      line-height: 1.18;
    }
    .reader .subtitle {
      font-style: italic;
      color: var(--white);
      opacity: .9;
      font-size: 1.1rem;
      margin-bottom: 1.6rem;
    }
    .reader .reader-meta {
      display: flex;
      align-items: center;
      gap: .8rem;
      padding: 1rem 0;
      border-top: 1px solid rgba(255,255,255,.12);
      border-bottom: 1px solid rgba(255,255,255,.12);
      margin-bottom: 2rem;
      color: var(--white);
      font-family: 'Libre Baskerville', serif;
      font-size: .9rem;
    }
    .reader .reader-meta img {
      width: 2.2rem; height: 2.2rem; border-radius: 50%;
      border: 1px solid rgba(255,255,255,.4);
    }
    .reader .reader-meta .author { font-weight: 700; }
    .reader .reader-meta .dot { opacity: .5; }

    /* Rendered article body */
    .reader-content {
      color: var(--white);
      font-family: 'Libre Baskerville', serif;
      font-size: 1.02rem;
      line-height: 1.8;
    }
    .reader-content h1, .reader-content h2, .reader-content h3,
    .reader-content h4, .reader-content h5, .reader-content h6 {
      font-family: 'The Seasons', 'Cormorant Garamond', Georgia, serif;
      color: var(--white);
      letter-spacing: .04em;
      margin: 2rem 0 .8rem;
      line-height: 1.25;
    }
    .reader-content h1 { font-size: 1.9rem; }
    .reader-content h2 { font-size: 1.6rem; }
    .reader-content h3 { font-size: 1.35rem; }
    .reader-content p { margin-bottom: 1rem; color: var(--white); }
    .reader-content a { color: var(--lavender-bg); text-decoration: underline; }
    .reader-content a:hover { color: var(--lavender-lt); }
    .reader-content blockquote {
      border-left: 3px solid var(--lavender-bg);
      padding-left: 1.2rem;
      margin: 1.5rem 0;
      font-style: italic;
      color: var(--white);
      opacity: .92;
    }
    .reader-content ul, .reader-content ol {
      margin: 0 0 1rem 1.6rem;
      color: var(--white);
    }
    .reader-content li { margin-bottom: .4rem; }
    .reader-content img {
      width: 100%;
      border-radius: 1rem;
      margin: 1.5rem 0;
      border: 1px solid rgba(255,255,255,.18);
    }
    .reader-content pre, .reader-content code {
      background: rgba(255,255,255,.08);
      border-radius: .4rem;
      color: var(--white);
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    .reader-content code { padding: .1rem .35rem; font-size: .9em; }
    .reader-content pre { padding: 1rem; overflow-x: auto; margin: 1rem 0; }

    /* Action bar */
    .action-bar {
      display: flex;
      gap: .8rem;
      align-items: center;
      padding: 1.5rem 0 .5rem;
      margin-top: 2rem;
      border-top: 1px solid rgba(255,255,255,.12);
      flex-wrap: wrap;
    }
    .action-btn {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      padding: .6rem 1.1rem;
      border: 1.5px solid rgba(255,255,255,.25);
      border-radius: var(--radius-btn);
      background: transparent;
      color: var(--white);
      font-family: 'Libre Baskerville', serif;
      font-size: .85rem;
      cursor: pointer;
      transition: background var(--transition), border-color var(--transition),
                  transform var(--transition), color var(--transition);
    }
    .action-btn:hover {
      border-color: var(--white);
      transform: translateY(-2px);
    }
    .action-btn.active {
      background: var(--lavender-bg);
      color: var(--navy);
      border-color: var(--lavender-bg);
    }
    .action-btn.active svg { fill: var(--navy); }
    .action-btn svg {
      width: 1rem; height: 1rem;
      fill: var(--white);
      transition: fill var(--transition), transform var(--transition);
    }
    .action-btn.pulse svg { animation: pulse .5s ease; }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50%      { transform: scale(1.4); }
    }
    .reader-tags {
      display: flex;
      gap: .4rem;
      flex-wrap: wrap;
      margin: 1.5rem 0 0;
    }
    .reader-tags span {
      padding: .3rem .8rem;
      background: rgba(207,214,245,.12);
      border: 1px solid rgba(207,214,245,.35);
      border-radius: var(--radius-btn);
      font-size: .72rem;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--white);
      font-family: 'Libre Baskerville', serif;
    }

    /* Composer modal */
    .composer .composer-header {
      padding: 1.6rem 2.4rem 1.2rem;
      border-bottom: 1px solid rgba(255,255,255,.12);
    }
    .composer .composer-header h2 {
      font-family: 'The Seasons', 'Cormorant Garamond', Georgia, serif;
      font-size: 1.6rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--white);
    }
    .composer form { padding: 1.8rem 2.4rem 2rem; }
    .composer label {
      display: block;
      font-family: 'Libre Baskerville', serif;
      font-size: .78rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--white);
      opacity: .85;
      margin-bottom: .5rem;
    }
    .composer input[type="text"],
    .composer textarea {
      width: 100%;
      background: rgba(255,255,255,.06);
      border: 1.5px solid rgba(255,255,255,.18);
      border-radius: .8rem;
      padding: .9rem 1.1rem;
      color: var(--white);
      font-family: 'Libre Baskerville', serif;
      font-size: 1rem;
      transition: border-color var(--transition), background var(--transition);
    }
    .composer input[type="text"]:focus,
    .composer textarea:focus {
      outline: none;
      border-color: var(--lavender-bg);
      background: rgba(255,255,255,.09);
    }
    .composer .field { margin-bottom: 1.3rem; }
    .composer .title-input {
      font-family: 'The Seasons', 'Cormorant Garamond', Georgia, serif;
      font-size: 1.5rem;
      letter-spacing: .04em;
    }

    /* Cover image dropzone */
    .cover-dropzone {
      position: relative;
      width: 100%;
      aspect-ratio: 21 / 9;
      border: 1.5px dashed rgba(255,255,255,.3);
      border-radius: 1rem;
      background-size: cover;
      background-position: center;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--white);
      font-style: italic;
      font-size: .9rem;
      overflow: hidden;
      transition: border-color var(--transition), background-color var(--transition);
    }
    .cover-dropzone:hover { border-color: var(--white); }
    .cover-dropzone.has-image { border-style: solid; border-color: rgba(255,255,255,.3); }
    .cover-dropzone.has-image .cover-prompt { display: none; }
    .cover-dropzone .cover-prompt {
      background: rgba(18,18,46,.6);
      padding: .7rem 1.3rem;
      border-radius: var(--radius-btn);
      pointer-events: none;
    }
    .cover-dropzone input[type="file"] {
      position: absolute; inset: 0;
      opacity: 0; cursor: pointer;
    }

    /* Tags input */
    .tag-input-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: .4rem;
      background: rgba(255,255,255,.06);
      border: 1.5px solid rgba(255,255,255,.18);
      border-radius: .8rem;
      padding: .6rem .8rem;
      align-items: center;
      transition: border-color var(--transition), background var(--transition);
    }

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";

    } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

    /* ── Firebase init ── */
    const firebaseConfig = {
      apiKey: "AIzaSyCubjX7XwPD9lfOh2kdBO0DRlDQSn9OZWs",
      authDomain: "urban-bears.firebaseapp.com",
      projectId: "urban-bears",
      storageBucket: "urban-bears.firebasestorage.app",
      messagingSenderId: "624423642068",
      appId: "1:624423642068:web:78c4845d6765a9dc07ec41",
      measurementId: "G-9W94R3112S"
    };
    const app = initializeApp(firebaseConfig);
    try { getAnalytics(app); } catch (e) { /* analytics fails on file:// — fine */ }
    const auth = getAuth(app);

    /* ── Image helpers (no Storage — downscale + compress to data URL) ──
       Firestore docs cap at ~1 MiB. Keep covers ≤ ~180 KB and inline
       images ≤ ~120 KB so 4–5 inline images per article still fits. */
    const COVER_MAX_W = 1400;
    const INLINE_MAX_W = 1100;
    const QUALITY = 0.82;
    const MAX_BODY_BYTES = 850_000; // soft cap before publish

    const fileToCompressedDataUrl = (file, maxW = 1200, quality = QUALITY) =>
      new Promise((resolve, reject) => {
        if (!file.type.startsWith('image/')) return reject(new Error('Not an image'));
        const reader = new FileReader();
        reader.onerror = () => reject(reader.error);
        reader.onload = () => {
          const img = new Image();
          img.onerror = () => reject(new Error('Image decode failed'));
          img.onload = () => {
            const scale = Math.min(1, maxW / img.width);
            const w = Math.round(img.width * scale);
            const h = Math.round(img.height * scale);
            const canvas = document.createElement('canvas');
            canvas.width = w; canvas.height = h;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, w, h);
            // GIFs/PNGs with transparency → keep PNG; otherwise JPEG.
            const isPng = file.type === 'image/png' || file.type === 'image/gif';
            const mime = isPng ? 'image/png' : 'image/jpeg';
            resolve(canvas.toDataURL(mime, quality));
          };
          img.src = reader.result;
        };
        reader.readAsDataURL(file);
      });

    /* ── App state ── */
    const state = {
      user: null,
      isAuthor: false,
      articles: [],
      activeTag: null,
      currentArticleId: null,
      currentArticleUnsub: null,
    };

    /* ── Element refs ── */
    const $ = (id) => document.getElementById(id);
    const els = {
      authBar:       $('auth-bar'),
      btnSignin:     $('btn-signin'),
      btnSignout:    $('btn-signout'),
      navUserWrap:   $('nav-user-wrap'),
      navUserChip:   $('nav-user-chip'),
      btnNewArticle: $('btn-new-article'),
      tabs:          document.querySelectorAll('.research-tabs button'),
      viewHome:      $('view-home'),
      viewArchive:   $('view-archive'),
      homeContent:   $('home-content'),
      archiveContent:$('archive-content'),
      archiveSearch: $('archive-search'),
      readerOverlay: $('reader-overlay'),
      readerClose:   $('reader-close'),
      readerCover:   $('reader-cover'),
      readerTitle:   $('reader-title'),
      readerSubtitle:$('reader-subtitle'),
      readerAuthorPhoto: $('reader-author-photo'),
      readerAuthorName:  $('reader-author-name'),
      readerDate:    $('reader-date'),
      readerContent: $('reader-content'),
      readerTags:    $('reader-tags'),
      likeBtn:       $('action-like'),
      repostBtn:     $('action-repost'),
      shareBtn:      $('action-share'),
      likeCount:     $('like-count'),
      repostCount:   $('repost-count'),
      composerOverlay: $('composer-overlay'),
      composerClose: $('composer-close'),
      composerForm:  $('composer-form'),
      compTitle:     $('comp-title'),
      compSubtitle:  $('comp-subtitle'),
      compCover:     $('comp-cover'),
      coverDropzone: $('cover-dropzone'),
      tagInputWrap:  $('tag-input-wrap'),
      compTagInput:  $('comp-tag-input'),
      btnCancel:     $('btn-cancel'),
      btnPublish:    $('btn-publish'),
      toast:         $('toast'),
    };

    /* ── Util ── */
    const fmtDate = (ts) => {
      if (!ts) return '';
      const d = ts.toDate ? ts.toDate() : new Date(ts);
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    };
    const escapeHtml = (s = '') => s.replace(/[&<>"']/g, c =>
      ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    const showToast = (msg) => {
      els.toast.textContent = msg;
      els.toast.classList.add('show');
      clearTimeout(showToast._t);
      showToast._t = setTimeout(() => els.toast.classList.remove('show'), 2400);
    };
    const openOverlay = (overlay) => {
      overlay.classList.add('open');
      overlay.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
    };
    const closeOverlay = (overlay) => {
      overlay.classList.remove('open');
      overlay.setAttribute('aria-hidden', 'true');
      document.body.style.overflow = '';
    };

    /* ════════════════════════════════════════════════════════
       AUTH
    ════════════════════════════════════════════════════════ */
    els.btnSignin.addEventListener('click', async () => {
      try {
        await signInWithPopup(auth, provider);
      } catch (e) {
        console.error(e);
        showToast('Sign in failed');
      }
    });

    els.btnSignout.addEventListener('click', () => signOut(auth));

    const renderAuthBar = () => {
      if (state.user) {
        els.btnSignin.hidden = true;
        els.navUserWrap.hidden = false;
        els.navUserChip.innerHTML = `
          <img src="${state.user.photoURL || ''}" alt="" />
          <div><div class="name">${escapeHtml(state.user.displayName || 'Reader')}</div></div>
        `;
        els.btnNewArticle.hidden = !state.isAuthor;
      } else {
        els.btnSignin.hidden = false;
        els.navUserWrap.hidden = true;
        els.btnNewArticle.hidden = true;
      }
    };

    onAuthStateChanged(auth, async (user) => {
      state.user = user;
      state.isAuthor = false;
      if (user) {
        try {
          const authorDoc = await getDoc(doc(db, 'authors', user.uid));
          state.isAuthor = authorDoc.exists();
        } catch (e) { console.warn('author check failed', e); }
      }
      renderAuthBar();
      // Re-render reader buttons if open
      if (state.currentArticleId) syncActionButtons();
    });

    /* ════════════════════════════════════════════════════════
       TABS
    ════════════════════════════════════════════════════════ */
    els.tabs.forEach(btn => {
      btn.addEventListener('click', () => {
        els.tabs.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const view = btn.dataset.view;
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(`view-${view}`).classList.add('active');
      });
    });

    /* ════════════════════════════════════════════════════════
       FETCH ARTICLES
    ════════════════════════════════════════════════════════ */
    const loadArticles = async () => {
      try {
        const q = query(collection(db, 'articles'), orderBy('createdAt', 'desc'), limit(60));
        const snap = await getDocs(q);
        state.articles = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      } catch (e) {
        console.error('load articles failed', e);
        state.articles = [];
      }
      renderHome();
      renderArchive();
      renderTagChips();
    };

    /* ════════════════════════════════════════════════════════
       RENDER — HOME
    ════════════════════════════════════════════════════════ */
    const renderHome = () => {
      if (!state.articles.length) {
        els.homeContent.innerHTML = `
          <div class="empty-state">
            No articles yet. ${state.isAuthor ? 'Click <strong>+ New Article</strong> to write the first one.' : 'Check back soon.'}
          </div>`;
        return;
      }

      const featured = state.articles[0];
      const leftArticles = state.articles.slice(1, 3);
      const popularArticles = [...state.articles]
        .sort((a, b) => (b.likeCount || 0) - (a.likeCount || 0))
        .slice(0, 6);

      const smallCardHtml = (a) => `
        <article class="small-card" data-id="${a.id}">
          <div class="cover" ${a.coverUrl ? `style="background-image:url('${escapeHtml(a.coverUrl)}')"` : ''}></div>
          <h3>${escapeHtml(a.title || 'Untitled')}</h3>
          <div class="card-meta">${escapeHtml(a.authorName || 'Anonymous')} · ${fmtDate(a.createdAt)}</div>
        </article>`;

      const featuredCoverStyle = featured.coverUrl
        ? `style="background-image:url('${escapeHtml(featured.coverUrl)}')"` : '';

      const popularRowHtml = (a) => `
        <div class="popular-row" data-id="${a.id}">
          <div class="info">
            <h4>${escapeHtml(a.title || 'Untitled')}</h4>
            <div class="card-meta">${fmtDate(a.createdAt)} · URBANBEARS</div>
          </div>
          <div class="thumb" ${a.coverUrl ? `style="background-image:url('${escapeHtml(a.coverUrl)}')"` : ''}></div>
        </div>`;

      els.homeContent.innerHTML = `
        <div class="home-grid">
          <div class="home-left">
            ${leftArticles.length ? leftArticles.map(smallCardHtml).join('') : ''}
          </div>
          <div class="home-center">
            <article class="featured-center" data-id="${featured.id}">
              <div class="cover" ${featuredCoverStyle}></div>
              <h2>${escapeHtml(featured.title || 'Untitled')}</h2>
              <div class="card-meta">${escapeHtml(featured.authorName || 'Anonymous')} · ${fmtDate(featured.createdAt)}</div>
            </article>
          </div>
          <div class="home-right">
            <div class="section-label">Most Popular <span class="see-all">View all</span></div>
            <div class="popular-list">
              ${popularArticles.map(popularRowHtml).join('')}
            </div>
          </div>
        </div>`;

      els.homeContent.querySelectorAll('[data-id]').forEach(node => {
        node.addEventListener('click', () => openReader(node.dataset.id));
      });
      els.homeContent.querySelector('.see-all')?.addEventListener('click', (e) => {
        e.stopPropagation();
        document.querySelector('.research-tabs [data-view="archive"]').click();
      });
    };

    /* ════════════════════════════════════════════════════════
       RENDER — ARCHIVE
    ════════════════════════════════════════════════════════ */
    const renderTagChips = () => {}; // no-op — tag UI removed

    let archiveSort = 'latest'; // 'latest' | 'top'

    const renderArchive = () => {
      const search = (els.archiveSearch.value || '').trim().toLowerCase();
      let list = [...state.articles];
      if (archiveSort === 'top') list.sort((a, b) => (b.likeCount || 0) - (a.likeCount || 0));
      if (search) {
        list = list.filter(a =>
          (a.title || '').toLowerCase().includes(search) ||
          (a.subtitle || '').toLowerCase().includes(search) ||
          (a.authorName || '').toLowerCase().includes(search)
        );
      }
      if (!list.length) {
        els.archiveContent.innerHTML = `<div class="empty-state">No articles match.</div>`;
        return;
      }
      els.archiveContent.innerHTML = `
        <ul class="archive-list">
          ${list.map((a, i) => `
            <li class="archive-row" data-id="${a.id}" style="animation-delay:${i * 0.04}s">
              <div class="info">
                <h3>${escapeHtml(a.title || 'Untitled')}</h3>
                <div class="row-meta">${escapeHtml(a.authorName || 'Anonymous')} · ${fmtDate(a.createdAt)} · URBANBEARS</div>
                <div class="row-stats">
                  <span>♥ ${a.likeCount || 0}</span>
                  <span>↻ ${a.repostCount || 0}</span>
                </div>
              </div>
              <div class="cover" ${a.coverUrl ? `style="background-image:url('${escapeHtml(a.coverUrl)}')"` : ''}></div>
            </li>`).join('')}
        </ul>`;
      els.archiveContent.querySelectorAll('[data-id]').forEach(node => {
        node.addEventListener('click', () => openReader(node.dataset.id));
      });
    };

    els.archiveSearch.addEventListener('input', renderArchive);

    // Sort tab toggle
    document.getElementById('archive-sort-tabs').querySelectorAll('button').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('#archive-sort-tabs button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        archiveSort = btn.dataset.sort;
        renderArchive();
      });
    });

    // Search icon toggle
    document.getElementById('archive-search-btn').addEventListener('click', () => {
      els.archiveSearch.classList.toggle('visible');
      if (els.archiveSearch.classList.contains('visible')) els.archiveSearch.focus();
    });

    /* ════════════════════════════════════════════════════════
       READER
    ════════════════════════════════════════════════════════ */
    const openReader = async (articleId) => {
      state.currentArticleId = articleId;
      openOverlay(els.readerOverlay);

      // Live subscription so likeCount/repostCount update in realtime
      if (state.currentArticleUnsub) state.currentArticleUnsub();
      state.currentArticleUnsub = onSnapshot(doc(db, 'articles', articleId), (snap) => {
        if (!snap.exists()) return;
        const a = { id: snap.id, ...snap.data() };
        renderReader(a);
      });

      // Bump view count (best-effort)
      try {
        await updateDoc(doc(db, 'articles', articleId), { viewCount: increment(1) });
      } catch (e) { /* not critical */ }

      syncActionButtons();
    };

    const renderReader = (a) => {
      els.readerCover.style.backgroundImage = a.coverUrl ? `url('${a.coverUrl}')` : '';
      els.readerTitle.textContent = a.title || 'Untitled';
      els.readerSubtitle.textContent = a.subtitle || '';
      els.readerSubtitle.style.display = a.subtitle ? '' : 'none';
      els.readerAuthorPhoto.src = a.authorPhoto || '';
      els.readerAuthorPhoto.style.display = a.authorPhoto ? '' : 'none';
      els.readerAuthorName.textContent = a.authorName || 'Anonymous';
      els.readerDate.textContent = fmtDate(a.createdAt);
      els.readerContent.innerHTML = DOMPurify.sanitize(a.body || '');
      els.readerTags.innerHTML = (a.tags || [])
        .map(t => `<span>${escapeHtml(t)}</span>`).join('');
      els.likeCount.textContent = a.likeCount || 0;
      els.repostCount.textContent = a.repostCount || 0;
    };

    const syncActionButtons = async () => {
      els.likeBtn.classList.remove('active');
      els.repostBtn.classList.remove('active');
      if (!state.user || !state.currentArticleId) return;
      try {
        const [likeSnap, repostSnap] = await Promise.all([
          getDoc(doc(db, 'articles', state.currentArticleId, 'likes', state.user.uid)),
          getDoc(doc(db, 'articles', state.currentArticleId, 'reposts', state.user.uid)),
        ]);
        if (likeSnap.exists()) els.likeBtn.classList.add('active');
        if (repostSnap.exists()) els.repostBtn.classList.add('active');
      } catch (e) { /* ignore */ }
    };

    els.readerClose.addEventListener('click', () => {
      closeOverlay(els.readerOverlay);
      if (state.currentArticleUnsub) state.currentArticleUnsub();
      state.currentArticleUnsub = null;
      state.currentArticleId = null;
    });
    els.readerOverlay.addEventListener('click', (e) => {
      if (e.target === els.readerOverlay) els.readerClose.click();
    });

    /* ── Like / Repost / Share ── */
    const toggleEngagement = async (type) => {
      if (!state.user) {
        showToast('Sign in to interact');
        return;
      }
      const id = state.currentArticleId;
      if (!id) return;
      const subRef = doc(db, 'articles', id, type === 'like' ? 'likes' : 'reposts', state.user.uid);
      const countField = type === 'like' ? 'likeCount' : 'repostCount';
      const btn = type === 'like' ? els.likeBtn : els.repostBtn;
      try {
        const snap = await getDoc(subRef);
        if (snap.exists()) {
          await deleteDoc(subRef);
          await updateDoc(doc(db, 'articles', id), { [countField]: increment(-1) });
          btn.classList.remove('active');
        } else {
          await setDoc(subRef, { createdAt: serverTimestamp() });
          await updateDoc(doc(db, 'articles', id), { [countField]: increment(1) });
          btn.classList.add('active');
          btn.classList.add('pulse');
          setTimeout(() => btn.classList.remove('pulse'), 500);
        }
      } catch (e) {
        console.error(e);
        showToast('Action failed');
      }
    };

    els.likeBtn.addEventListener('click', () => toggleEngagement('like'));
    els.repostBtn.addEventListener('click', () => toggleEngagement('repost'));
    els.shareBtn.addEventListener('click', async () => {
      const id = state.currentArticleId;
      if (!id) return;
      const url = `${location.origin}${location.pathname}?article=${id}`;
      try {
        if (navigator.share) {
          await navigator.share({ url, title: els.readerTitle.textContent });
        } else {
          await navigator.clipboard.writeText(url);
          showToast('Link copied');
        }
      } catch (e) {
        try { await navigator.clipboard.writeText(url); showToast('Link copied'); }
        catch { showToast('Could not share'); }
      }
    });

    /* ════════════════════════════════════════════════════════
       COMPOSER (authors only)
    ════════════════════════════════════════════════════════ */
    let quill = null;
    let coverDataUrl = '';
    const tags = new Set();

    const initQuill = () => {
      if (quill) return;
      const toolbar = [
        [{ header: [1, 2, 3, false] }],
        ['bold', 'italic', 'underline', 'strike'],
        [{ list: 'ordered' }, { list: 'bullet' }],
        ['blockquote', 'code-block'],
        ['link', 'image'],
        ['clean']
      ];
      quill = new Quill('#editor', {
        theme: 'snow',
        placeholder: 'Paste your article here. Any markdown or formatting should automatically render.',
        modules: { toolbar }
      });

      // Custom image handler — compresses client-side and embeds as data URL
      // (No Firebase Storage — keeps the app on the free Spark plan.)
      quill.getModule('toolbar').addHandler('image', () => {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.click();
        input.onchange = async () => {
          const file = input.files?.[0];
          if (!file) return;
          showToast('Embedding image…');
          try {
            const dataUrl = await fileToCompressedDataUrl(file, INLINE_MAX_W);
            const range = quill.getSelection(true) || { index: quill.getLength() };
            quill.insertEmbed(range.index, 'image', dataUrl, 'user');
            quill.setSelection(range.index + 1);
            showToast('Image inserted');
          } catch (e) {
            console.error(e);
            showToast('Image embed failed');
          }
        };
      });

      // Markdown-on-paste — when plain text contains markdown syntax,
      // run it through marked.js and paste as formatted HTML
      const markdownRegex = /(^|\n)\s*(#{1,6}\s|[-*+]\s|\d+\.\s|>\s)|(\*\*[^*]+\*\*)|(__[^_]+__)|(\*[^*]+\*)|(_[^_]+_)|(`[^`]+`)|(\[[^\]]+\]\([^\)]+\))|(^```)/m;
      quill.root.addEventListener('paste', (e) => {
        const cd = e.clipboardData;
        if (!cd) return;
        const html = cd.getData('text/html');
        const text = cd.getData('text/plain');
        if (html) return; // rich paste — let Quill handle
        if (!text || !markdownRegex.test(text)) return;
        e.preventDefault();
        e.stopImmediatePropagation();
        const rendered = DOMPurify.sanitize(marked.parse(text));
        const range = quill.getSelection(true) || { index: quill.getLength(), length: 0 };
        if (range.length) quill.deleteText(range.index, range.length, 'user');
        quill.clipboard.dangerouslyPasteHTML(range.index, rendered, 'user');
      }, true);
    };

    const resetComposer = () => {
      els.composerForm.reset();
      coverDataUrl = '';
      els.coverDropzone.style.backgroundImage = '';
      els.coverDropzone.classList.remove('has-image');
      tags.clear();
      renderTagPills();
      if (quill) quill.setText('');
    };

    const renderTagPills = () => {
      // Remove existing pills, keep input
      els.tagInputWrap.querySelectorAll('.tag-pill').forEach(n => n.remove());
      [...tags].forEach(t => {
        const pill = document.createElement('span');
        pill.className = 'tag-pill';
        pill.innerHTML = `${escapeHtml(t)} <button type="button" aria-label="Remove">×</button>`;
        pill.querySelector('button').addEventListener('click', () => {
          tags.delete(t);
          renderTagPills();
        });
        els.tagInputWrap.insertBefore(pill, els.compTagInput);
      });
    };

    els.compTagInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ',') {
        e.preventDefault();
        const v = els.compTagInput.value.trim().replace(/,$/, '');
        if (v) { tags.add(v); renderTagPills(); }
        els.compTagInput.value = '';
      } else if (e.key === 'Backspace' && !els.compTagInput.value && tags.size) {
        const last = [...tags].pop();
        tags.delete(last);
        renderTagPills();
      }
    });

    els.compCover.addEventListener('change', async () => {
      const file = els.compCover.files?.[0];
      if (!file) return;
      try {
        coverDataUrl = await fileToCompressedDataUrl(file, COVER_MAX_W);
        els.coverDropzone.style.backgroundImage = `url('${coverDataUrl}')`;
        els.coverDropzone.classList.add('has-image');
      } catch (e) {
        console.error(e);
        showToast('Could not load image');
      }
    });

    els.btnNewArticle.addEventListener('click', () => {
      if (!state.isAuthor) return;
      resetComposer();
      initQuill();
      openOverlay(els.composerOverlay);
    });

    const closeComposer = () => {
      closeOverlay(els.composerOverlay);
      resetComposer();
    };
    els.composerClose.addEventListener('click', closeComposer);
    els.btnCancel.addEventListener('click', closeComposer);
    els.composerOverlay.addEventListener('click', (e) => {
      if (e.target === els.composerOverlay) closeComposer();
    });

    els.composerForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      if (!state.user || !state.isAuthor) {
        showToast('Authors only');
        return;
      }
      const title = els.compTitle.value.trim();
      const subtitle = els.compSubtitle.value.trim();
      const body = DOMPurify.sanitize(quill.root.innerHTML);
      if (!title) { showToast('Title required'); return; }
      if (quill.getText().trim().length < 1) { showToast('Body required'); return; }

      // Firestore caps docs at ~1 MiB. Estimate the payload before sending.
      const approxBytes = (body.length + (coverDataUrl?.length || 0)) * 0.75;
      if (approxBytes > MAX_BODY_BYTES) {
        showToast('Article too large — remove or shrink some images');
        return;
      }

      els.btnPublish.disabled = true;
      els.btnPublish.textContent = 'Publishing…';

      try {
        await addDoc(collection(db, 'articles'), {
          title,
          subtitle,
          body,
          coverUrl: coverDataUrl || '',
          tags: [...tags],
          authorUid: state.user.uid,
          authorName: state.user.displayName || 'Anonymous',
          authorPhoto: state.user.photoURL || '',
          createdAt: serverTimestamp(),
          updatedAt: serverTimestamp(),
          likeCount: 0,
          repostCount: 0,
          viewCount: 0,
        });
        showToast('Published!');
        closeComposer();
        await loadArticles();
      } catch (err) {
        console.error(err);
        showToast('Publish failed — check console');
      } finally {
        els.btnPublish.disabled = false;
        els.btnPublish.textContent = 'Publish';
      }
    });

    /* ════════════════════════════════════════════════════════
       ESC to close any overlay
    ════════════════════════════════════════════════════════ */
    document.addEventListener('keydown', (e) => {
      if (e.key !== 'Escape') return;
      if (els.composerOverlay.classList.contains('open')) closeComposer();
      else if (els.readerOverlay.classList.contains('open')) els.readerClose.click();
    });

    /* ════════════════════════════════════════════════════════
       Deep-link ?article=ID opens the reader
    ════════════════════════════════════════════════════════ */
    const initialArticle = new URLSearchParams(location.search).get('article');

    /* ── Bootstrap ── */
    loadArticles().then(() => {
      if (initialArticle) openReader(initialArticle);
    });
  </script>
</body>
</html>
